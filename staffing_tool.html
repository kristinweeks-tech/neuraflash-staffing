function WC({v,t}){
  if(!v||v===0)return<td style={{width:36,padding:"1px",textAlign:"center"}}><span style={{fontSize:8,color:"#111827"}}>·</span></td>;
  let bg,fg,disp=v;
  if(t==="s"){
    if(v<0){bg="#2d0000";fg="#ef4444";}
    else if(v>=25){bg="#052e16";fg="#34d399";}
    else if(v>=10){bg="#0c2a1a";fg="#6ee7b7";}
    else{bg="#1a2535";fg="#4a6080";}
  }else if(t==="d"){
    if(v>=35){bg="#3b1500";fg="#fb923c";}
    else if(v>=20){bg="#2d1a00";fg="#fbbf24";}
    else{bg="#1c1500";fg="#fde68a";}
  }else{
    disp=v>0?`+${v}`:v;
    if(v>=15){bg="#052e16";fg="#34d399";}
    else if(v>=0){bg="#0c2a1a";fg="#86efac";}
    else if(v>=-10){bg="#2d0f0f";fg="#f87171";}
    else{bg="#3b0000";fg="#ef4444";}
  }
  return<td style={{width:36,padding:"1px",textAlign:"center"}}><div style={{background:bg,color:fg,fontSize:8,fontWeight:700,borderRadius:2,padding:"2px 0",minWidth:30,textAlign:"center",margin:"0 auto"}}>{disp}</div></td>;
}

function Picker({opp,people,usedNames,onPick,onClose}){
  const[q,setQ]=useState("");
  const avail=people.filter(p=>!usedNames.has(p.name)&&p.tot>0&&p.name.toLowerCase().includes(q.toLowerCase()));
  const bench=people.filter(p=>p.tot===0&&p.name.toLowerCase().includes(q.toLowerCase()));
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d1424",border:"1px solid #1e293b",borderRadius:10,width:"100%",maxWidth:480,maxHeight:"80vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #0f172a"}}>
          <div style={{fontSize:13,fontWeight:800,color:"#f1f5f9",marginBottom:2}}>Assign Person</div>
          <div style={{fontSize:10,color:"#818cf8",fontWeight:600}}>{opp.project}</div>
          <div style={{fontSize:9,color:"#475569",marginTop:2}}>{opp.role}{opp.skill?` / ${opp.skill}`:""} · {opp.tot}h total</div>
        </div>
        <div style={{padding:"10px 16px",borderBottom:"1px solid #0f172a"}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by name…" autoFocus
            style={{width:"100%",padding:"7px 10px",background:"#111827",border:"1px solid #1e293b",borderRadius:6,color:"#e2e8f0",fontSize:11,outline:"none"}}/>
        </div>
        <div style={{overflowY:"auto",padding:"8px 12px",flex:1}}>
          {avail.length>0&&<div style={{fontSize:8,color:"#34d399",textTransform:"uppercase",letterSpacing:"0.1em",padding:"4px 4px 6px",fontWeight:700}}>Available — {avail.length} people</div>}
          {avail.map(p=>(
            <div key={p.id} onClick={()=>onPick(p.name)}
              style={{padding:"9px 12px",borderRadius:7,cursor:"pointer",marginBottom:4,background:"#111827",border:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"space-between"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#6366f1";e.currentTarget.style.background="#13192e";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.background="#111827";}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0"}}>{FL(p.country)} {p.name}</div>
                <div style={{fontSize:9,color:"#475569"}}>{p.role} · {p.country}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:12,fontWeight:800,color:"#34d399"}}>{p.tot}h</div>
                <div style={{fontSize:8,color:"#334155"}}>avail</div>
              </div>
            </div>
          ))}
          {bench.length>0&&<>
            <div style={{fontSize:8,color:"#334155",textTransform:"uppercase",letterSpacing:"0.1em",padding:"8px 4px 6px",marginTop:4}}>Bench / 0h ({bench.length})</div>
            {bench.map(p=>(
              <div key={p.id} onClick={()=>onPick(p.name)}
                style={{padding:"7px 12px",borderRadius:7,cursor:"pointer",marginBottom:3,background:"#0a1020",border:"1px solid #0f172a",display:"flex",alignItems:"center",justifyContent:"space-between",opacity:0.65}}
                onMouseEnter={e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.borderColor="#334155";}}
                onMouseLeave={e=>{e.currentTarget.style.opacity="0.65";e.currentTarget.style.borderColor="#0f172a";}}>
                <div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{FL(p.country)} {p.name}</div>
                  <div style={{fontSize:9,color:"#334155"}}>{p.role}</div>
                </div>
                <span style={{fontSize:9,color:"#1e293b"}}>0h</span>
              </div>
            ))}
          </>}
          {avail.length===0&&bench.length===0&&<div style={{padding:"20px 0",textAlign:"center",color:"#334155",fontSize:11}}>No people match "{q}"</div>}
        </div>
        <div style={{padding:"10px 16px",borderTop:"1px solid #0f172a"}}>
          <button onClick={onClose} style={{width:"100%",padding:"8px",background:"transparent",border:"1px solid #1e293b",color:"#475569",borderRadius:6,fontSize:10,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[asgn,setAsgn]=useState({});
  const[tab,setTab]=useState("agentforce");
  const[picker,setPicker]=useState(null);
  const[saved,setSaved]=useState(false);
  const[ready,setReady]=useState(false);

  useEffect(()=>{
    try{const r=localStorage.getItem(SK);if(r)setAsgn(JSON.parse(r));}catch(e){}
    setReady(true);
  },[]);

  useEffect(()=>{
    if(!ready)return;
    try{localStorage.setItem(SK,JSON.stringify(asgn));setSaved(true);setTimeout(()=>setSaved(false),1200);}catch(e){}
  },[asgn,ready]);

  const cur=DATA.tabs.find(t=>t.id===tab)||DATA.tabs[0];

  const liveGaps=useMemo(()=>{
    const g={};
    for(const t of DATA.tabs){
      g[t.id]=t.opps.filter(o=>!asgn[o.id]&&o.status==="GAP").length;
    }
    return g;
  },[asgn]);

  const totalGaps=useMemo(()=>Object.values(liveGaps).reduce((s,v)=>s+v,0),[liveGaps]);
  const totalAsgn=Object.keys(asgn).length;
  const allOpps=DATA.tabs.flatMap(t=>t.opps);
  const totalCovered=allOpps.filter(o=>asgn[o.id]||(o.status==="COVERED"&&!asgn[o.id])).length;

  const usedNames=useMemo(()=>new Set(Object.values(asgn)),[asgn]);

  const assign=(oid,name)=>setAsgn(p=>({...p,[oid]:name}));
  const unassign=oid=>setAsgn(p=>{const n={...p};delete n[oid];return n;});

  const dates=DATA.dates;

  const sw=Array(13).fill(0);
  const dw=Array(13).fill(0);
  cur.people.forEach(p=>p.h.forEach((v,i)=>{if(v>0)sw[i]+=v;}));
  cur.opps.forEach(o=>o.h.forEach((v,i)=>{if(v>0)dw[i]+=v;}));
  const nw=sw.map((s,i)=>Math.round(s-dw[i]));

  const sortedOpps=[...cur.opps].sort((a,b)=>{
    const po={Commit:0,"Strong Upside":1,"Best Case":2};
    return(po[a.cat]||3)-(po[b.cat]||3)||b.tot-a.tot;
  });

  return(
    <div style={{minHeight:"100vh",background:"#070c17",color:"#e2e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>

      {/* HEADER */}
      <div style={{padding:"8px 14px",borderBottom:"1px solid #0a1020",background:"#060b15",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontSize:8,color:"#334155",letterSpacing:"0.18em",textTransform:"uppercase"}}>NeuraFlash · Mar–May 2026</div>
          <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9",letterSpacing:"-0.02em",lineHeight:1.2}}>Staffing Assignment Tool</div>
        </div>
        <div style={{flex:1}}/>
        <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          {[
            {v:totalAsgn,l:"Assigned",c:"#818cf8"},
            {v:totalCovered,l:"Covered",c:"#34d399"},
            {v:totalGaps,l:"Gaps Left",c:totalGaps>0?"#ef4444":"#34d399"}
          ].map(x=>(
            <div key={x.l} style={{textAlign:"center",minWidth:46}}>
              <div style={{fontSize:20,fontWeight:800,color:x.c,lineHeight:1}}>{x.v}</div>
              <div style={{fontSize:7,color:"#334155",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:1}}>{x.l}</div>
            </div>
          ))}
          <span style={{fontSize:8,color:saved?"#34d399":"#1a2535",transition:"color 0.5s",fontStyle:"italic",minWidth:60}}>{saved?"✓ saved":"auto-save"}</span>
          <button onClick={()=>{if(window.confirm("Reset all manual assignments?"))setAsgn({});}}
            style={{padding:"4px 10px",background:"transparent",border:"1px solid #3b0000",color:"#ef4444",borderRadius:5,fontSize:9,cursor:"pointer"}}>
            Reset All
          </button>
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid #0a1020",background:"#050a14",padding:"0 6px"}}>
        {DATA.tabs.map(t=>{
          const g=liveGaps[t.id]||0;
          const act=tab===t.id;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:"7px 12px",border:"none",borderBottom:`2px solid ${act?t.color:"transparent"}`,background:act?"#0d1424":"transparent",
                      color:act?"#f1f5f9":"#475569",cursor:"pointer",fontSize:10,fontWeight:act?700:400,whiteSpace:"nowrap",
                      display:"flex",alignItems:"center",gap:5,transition:"all 0.12s",outline:"none"}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:t.color,opacity:act?1:0.3,flexShrink:0,display:"inline-block"}}/>
              {t.label}
              {g>0&&<span style={{fontSize:7,background:"#3b0000",color:"#ef4444",padding:"0 4px",borderRadius:8,fontWeight:800,lineHeight:"15px"}}>{g}</span>}
            </button>
          );
        })}
      </div>

      {/* TABLE */}
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",minWidth:960,width:"100%"}}>
          <thead>
            <tr style={{background:"#050a14",borderBottom:"2px solid #0a1020"}}>
              <th style={{padding:"5px 12px",textAlign:"left",fontSize:8,color:"#334155",fontWeight:400,textTransform:"uppercase",letterSpacing:"0.1em",minWidth:200,position:"sticky",left:0,background:"#050a14",zIndex:10}}>Name / Opportunity</th>
              <th style={{padding:"5px 8px",textAlign:"left",fontSize:8,color:"#334155",fontWeight:400,textTransform:"uppercase",letterSpacing:"0.1em",minWidth:200}}>Assignment</th>
              <th style={{padding:"5px 6px",textAlign:"center",fontSize:8,color:"#334155",fontWeight:400,width:44}}>Hrs</th>
              {dates.map(d=><th key={d} style={{padding:"3px 1px",textAlign:"center",fontSize:7,color:"#334155",fontWeight:400,width:36,whiteSpace:"nowrap"}}>{d}</th>)}
            </tr>
          </thead>
          <tbody>
            {/* ── SUPPLY ── */}
            <tr>
              <td colSpan={3+dates.length} style={{padding:"6px 12px 2px",background:"#050a14"}}>
                <span style={{fontSize:8,fontWeight:700,color:"#34d399",textTransform:"uppercase",letterSpacing:"0.14em",borderBottom:"1px solid #052e16",paddingBottom:2,display:"inline-block"}}>
                  ▲ Supply · {cur.people.length} people
                </span>
              </td>
            </tr>
            {cur.people.map((p,i)=>{
              const asgnOid=Object.keys(asgn).find(oid=>asgn[oid]===p.name);
              const asgnProj=asgnOid?allOpps.find(o=>o.id===asgnOid)?.project:null;
              const bg=asgnOid?"#03100a":(i%2===0?"transparent":"#07101a");
              return(
                <tr key={p.id} style={{background:bg,borderBottom:"1px solid #080f1a"}}>
                  <td style={{padding:"3px 12px",position:"sticky",left:0,background:bg,zIndex:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:11,fontWeight:600,color:asgnOid?"#34d399":"#94a3b8"}}>{p.name}</span>
                      <span style={{fontSize:10}}>{FL(p.country)}</span>
                    </div>
                    <div style={{fontSize:8,color:"#334155",marginTop:1}}>{p.role}{p.skill?` · ${p.skill}`:""}</div>
                  </td>
                  <td style={{padding:"3px 8px"}}>
                    {asgnProj
                      ?<span style={{fontSize:9,color:"#34d399",fontStyle:"italic"}}>✓ {asgnProj.length>42?asgnProj.slice(0,40)+"…":asgnProj}</span>
                      :<span style={{fontSize:9,color:"#1a2535"}}>—</span>}
                  </td>
                  <td style={{padding:"3px 6px",textAlign:"center"}}>
                    <span style={{fontSize:10,fontWeight:800,color:asgnOid?"#34d399":p.tot>0?"#6ee7b7":"#1a2535"}}>{p.tot}</span>
                  </td>
                  {p.h.map((v,j)=><WC key={j} v={v} t="s"/>)}
                </tr>
              );
            })}
            <tr style={{borderTop:"1px solid #0a1020",background:"#050a14"}}>
              <td style={{padding:"3px 12px",fontSize:9,fontWeight:800,color:"#34d399",textTransform:"uppercase",letterSpacing:"0.06em",position:"sticky",left:0,background:"#050a14",zIndex:5}}>Total Supply</td>
              <td/>
              <td style={{padding:"3px 6px",textAlign:"center",fontSize:10,fontWeight:800,color:"#34d399"}}>{cur.people.reduce((s,p)=>s+p.tot,0)}</td>
              {sw.map((v,i)=><td key={i} style={{padding:"1px",textAlign:"center"}}><div style={{fontSize:8,fontWeight:800,color:"#34d399",background:"#052e16",borderRadius:2,padding:"2px 0",textAlign:"center"}}>{v||"·"}</div></td>)}
            </tr>

            <tr><td colSpan={3+dates.length} style={{height:12,background:"#050a14"}}></td></tr>

            {/* ── DEMAND ── */}
            <tr>
              <td colSpan={3+dates.length} style={{padding:"6px 12px 2px",background:"#050a14"}}>
                <span style={{fontSize:8,fontWeight:700,color:"#fbbf24",textTransform:"uppercase",letterSpacing:"0.14em",borderBottom:"1px solid #451a03",paddingBottom:2,display:"inline-block"}}>
                  ▼ Demand · {cur.opps.length} opps · {liveGaps[tab]||0} gaps
                </span>
              </td>
            </tr>
            {sortedOpps.map((o,i)=>{
              const aname=asgn[o.id];
              const isGap=!aname&&o.status==="GAP";
              const isCovered=!aname&&o.status==="COVERED";
              const takenSuggestion=o.suggestion&&usedNames.has(o.suggestion)&&!aname;
              const bg=aname?"#03100a":isGap?"#120303":(i%2===0?"transparent":"#07101a");
              const icon=aname?"✓":isGap?"✗":o.delay>0?"~":"✓";
              const iconC=aname?"#34d399":isGap?"#ef4444":o.delay>0?"#fbbf24":"#34d399";
              return(
                <tr key={o.id} style={{background:bg,borderBottom:"1px solid #080f1a"}}>
                  <td style={{padding:"4px 12px",position:"sticky",left:0,background:bg,zIndex:5}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:5}}>
                      <span style={{fontSize:12,color:iconC,fontWeight:800,flexShrink:0,lineHeight:"16px"}}>{icon}</span>
                      <div>
                        <div style={{fontSize:10,fontWeight:700,color:"#e2e8f0",lineHeight:1.3}}>{o.project.length>46?o.project.slice(0,44)+"…":o.project}</div>
                        <div style={{display:"flex",gap:4,marginTop:2,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontSize:7,color:CAT_FG[o.cat]||"#94a3b8",background:CAT_BG[o.cat]||"#0f172a",padding:"0 5px",borderRadius:6,fontWeight:700,lineHeight:"15px"}}>{o.cat}</span>
                          <span style={{fontSize:7,color:"#334155"}}>{o.role}{o.skill?` / ${o.skill}`:""}</span>
                          {o.delay>0&&!aname&&<span style={{fontSize:7,color:"#fbbf24",background:"#1a1200",padding:"0 5px",borderRadius:6,lineHeight:"15px"}}>~{o.delay}wk delay</span>}
                        </div>
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"4px 8px",verticalAlign:"middle"}}>
                    {aname?(
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:10,color:"#34d399",fontWeight:700}}>{aname}</span>
                        <button onClick={()=>unassign(o.id)}
                          style={{fontSize:8,padding:"1px 5px",background:"transparent",border:"1px solid #3b0000",color:"#ef4444",borderRadius:3,cursor:"pointer",lineHeight:"15px"}}>✕</button>
                      </div>
                    ):o.suggestion&&!takenSuggestion?(
                      <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                        <span style={{fontSize:9,color:"#6ee7b7",fontStyle:"italic"}}>💡 {o.suggestion}</span>
                        <button onClick={()=>assign(o.id,o.suggestion)}
                          style={{fontSize:8,padding:"2px 7px",background:"#052e16",border:"1px solid #10b981",color:"#10b981",borderRadius:4,cursor:"pointer"}}>Accept</button>
                        <button onClick={()=>setPicker({opp:o,people:cur.people})}
                          style={{fontSize:8,padding:"2px 7px",background:"#0d1424",border:"1px solid #1e293b",color:"#475569",borderRadius:4,cursor:"pointer"}}>Change</button>
                      </div>
                    ):takenSuggestion?(
                      <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                        <span style={{fontSize:9,color:"#ef4444"}}>⚠ {o.suggestion} (taken)</span>
                        <button onClick={()=>setPicker({opp:o,people:cur.people})}
                          style={{fontSize:8,padding:"2px 7px",background:"#150505",border:"1px solid #ef4444",color:"#ef4444",borderRadius:4,cursor:"pointer"}}>Pick other</button>
                      </div>
                    ):(
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:9,color:"#ef4444",fontStyle:"italic"}}>Hire needed</span>
                        <button onClick={()=>setPicker({opp:o,people:cur.people})}
                          style={{fontSize:8,padding:"2px 7px",background:"#150505",border:"1px solid #ef4444",color:"#ef4444",borderRadius:4,cursor:"pointer"}}>Assign bench</button>
                      </div>
                    )}
                  </td>
                  <td style={{padding:"3px 6px",textAlign:"center"}}>
                    <span style={{fontSize:10,fontWeight:800,color:isGap?"#ef4444":aname?"#34d399":"#fbbf24"}}>{o.tot}</span>
                  </td>
                  {o.h.map((v,j)=><WC key={j} v={v} t="d"/>)}
                </tr>
              );
            })}
            <tr style={{borderTop:"1px solid #0a1020",background:"#050a14"}}>
              <td style={{padding:"3px 12px",fontSize:9,fontWeight:800,color:"#fbbf24",textTransform:"uppercase",letterSpacing:"0.06em",position:"sticky",left:0,background:"#050a14",zIndex:5}}>Total Demand</td>
              <td/>
              <td style={{padding:"3px 6px",textAlign:"center",fontSize:10,fontWeight:800,color:"#fbbf24"}}>{cur.opps.reduce((s,o)=>s+o.tot,0)}</td>
              {dw.map((v,i)=><td key={i} style={{padding:"1px",textAlign:"center"}}><div style={{fontSize:8,fontWeight:800,color:"#fbbf24",background:"#451a03",borderRadius:2,padding:"2px 0",textAlign:"center"}}>{v||"·"}</div></td>)}
            </tr>

            {/* NET */}
            <tr style={{borderTop:"2px solid #1e293b",background:"#050a14"}}>
              <td style={{padding:"4px 12px",fontSize:10,fontWeight:800,color:"#f1f5f9",textTransform:"uppercase",letterSpacing:"0.08em",position:"sticky",left:0,background:"#050a14",zIndex:5}}>◈ Net (Supply − Demand)</td>
              <td/>
              <td style={{padding:"3px 6px",textAlign:"center"}}>
                {(()=>{const n=cur.people.reduce((s,p)=>s+p.tot,0)-cur.opps.reduce((s,o)=>s+o.tot,0);return<span style={{fontSize:11,fontWeight:800,color:n>=0?"#34d399":"#ef4444"}}>{n>0?`+${n}`:n}</span>;})()}
              </td>
              {nw.map((v,i)=><WC key={i} v={v} t="n"/>)}
            </tr>
          </tbody>
        </table>
      </div>

      {/* FOOTER */}
      <div style={{padding:"10px 14px",borderTop:"1px solid #0a1020",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",background:"#050a14",marginTop:8}}>
        <span style={{fontSize:8,color:"#1e293b"}}>Color key:</span>
        {[["Supply available","#34d399","#052e16"],["Overallocated","#ef4444","#2d0000"],["Demand high","#fb923c","#3b1500"],["Net surplus","#34d399","#052e16"],["Net gap","#ef4444","#3b0000"]].map(([l,fg,bg])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:22,height:12,background:bg,borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:6,color:fg,fontWeight:700}}>hrs</span>
            </div>
            <span style={{fontSize:8,color:"#334155"}}>{l}</span>
          </div>
        ))}
        <div style={{flex:1}}/>
        <span style={{fontSize:8,color:"#1e293b"}}>Assignments saved to browser · NeuraFlash Internal</span>
      </div>

      {picker&&<Picker opp={picker.opp} people={picker.people} usedNames={usedNames} onPick={name=>{assign(picker.opp.id,name);setPicker(null);}} onClose={()=>setPicker(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
