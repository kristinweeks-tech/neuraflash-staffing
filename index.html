<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;
const SK="nf-staff-v11";

// ── EMBEDDED DATA (Mar–May 2026 snapshot) ──
const EMBEDDED_PEOPLE=JSON.parse(document.getElementById("d-people").textContent);
const EMBEDDED_OPPS=JSON.parse(document.getElementById("d-opps").textContent);



// ── CROSS-SKILL EQUIVALENCES ──
const PMDO_EQUIV=new Set(["Business Architect","Digital Transformation Lead"]);
const CROSS_SKILL={
  // Exact-match only — a person with this skill can ONLY match opps requiring this exact skill
  "Agentforce":["Agentforce"],
  "AWS":["AWS"],
  "Service Cloud Voice":["Service Cloud Voice"],
  "Service Cloud":["Service Cloud"],
  "Sales Cloud":["Sales Cloud"],
  "Field Service":["Field Service"],
  "Experience Cloud":["Experience Cloud"],
  "Digital Experience":["Digital Experience"],

  // Interchangeable group — RLM / CPQ / Billing cross-match freely
  "RLM":["RLM","CPQ","Billing"],
  "CPQ":["CPQ","RLM","Billing"],
  "Billing":["Billing","CPQ","RLM"],

  // TA/Salesforce → TA/Integrations (one-way exception handled in scoreMatch via sfIntegration flag)
  // Listed here for completeness; the actual logic is in the sfIntegration check
  "Salesforce":["Salesforce","Integrations"],
  "Integrations":["Integrations"],

  // Change Management — people always have skill:"Change Management" but opps use varied skill labels
  // A CM person can fill any CM demand slot regardless of the opp's skill label
  "Change Management":["Change Management","General","","Service Cloud Voice","Service Cloud","Sales Cloud"],

  // General / blank — catch-all, routes to Other tab
  "General":["General",""],
  "":["","General"],
};

// ── MATCH SCORE ENGINE ──
// Roles that must match exactly — no cross-role suggestions
const STRICT_ROLES=new Set([
  "Project Manager","Delivery Owner","Digital Transformation Lead",
  "Technical Delivery Owner","Release Manager","Change Management",
  "Quality Assurance","Designer"
]);

// scoreMatch: accepts optional allocatedHours (array[13] of already-committed hrs for this person)
function scoreMatch(person, opp, assignedNames, allocatedHours){
  if(assignedNames&&assignedNames.has(person.name)) return{score:0,grade:"X",color:"#475569",reason:"Already assigned"};

  // ── ROLE CHECK ──
  // For non-strict roles, person.role must still exactly match opp.role.
  // A SA cannot fill a TA slot and vice versa — manual override only.
  // Exception: Business Architect and Digital Transformation Lead are interchangeable
  const roleMatch=person.role===opp.role||(PMDO_EQUIV.has(person.role)&&PMDO_EQUIV.has(opp.role));
  if(!roleMatch) return{score:0,grade:"F",color:"#ef4444",reason:`Role mismatch (${person.role} ≠ ${opp.role})`};

  // ── SKILL CHECK ──
  const oppSkills=CROSS_SKILL[opp.skill]||[opp.skill];
  const exactSkill=opp.skill===person.skill||(opp.skill===""&&person.skill==="");
  const sfIntegration=person.role==="Technical Architect"&&person.skill==="Salesforce"&&opp.skill==="Integrations";
  // Change Management people (skill:"Change Management") match all CM demand regardless of opp skill label
  const cmSkill=person.role==="Change Management"&&person.skill==="Change Management";
  const crossSkill=!exactSkill&&!sfIntegration&&!cmSkill&&oppSkills.includes(person.skill);
  let score=0,reasons=[];
  if(exactSkill||sfIntegration||cmSkill){score+=40;reasons.push("Exact skill");}
  else if(crossSkill){score+=23;reasons.push("Cross-skill");}
  else return{score:0,grade:"F",color:"#ef4444",reason:"Skill mismatch"};

  // ── CAPACITY CHECK ──
  // Rules per user spec:
  //   0-5h over remaining availability → absorb, full score, no penalty (not worth hiring for)
  //   6-15h over → flag the weeks visually, apply modest penalty (-10pts per week capped at -25 total)
  //   16h+ over remaining → heavier penalty but still assignable (only 40h absolute is hard block)
  //   total > 40h absolute in any week → hard disqualify (non-negotiable ceiling)
  const HARD_CAP=40;
  let capacityPenalty=0;
  let overCapacityWeeks=[];
  if(opp.hours.some(h=>h>0)){
    for(let i=0;i<13;i++){
      const need=opp.hours[i]||0;
      if(need<=0) continue;
      const alreadyCommitted=allocatedHours?allocatedHours[i]||0:0;
      const rawAvail=person.hours[i]||0;
      const remaining=Math.max(0,rawAvail-alreadyCommitted);
      const totalIfAssigned=alreadyCommitted+need;
      // Hard ceiling: 40h total in any week, no exceptions
      if(totalIfAssigned>HARD_CAP){
        return{score:0,grade:"F",color:"#ef4444",reason:`Exceeds 40h cap wk${i+1} (${totalIfAssigned}h total)`};
      }
      const overage=need-remaining;
      // 6-15h over → flag the week, small cumulative penalty
      // 16h+ over → same but heavier penalty (still assignable, just flagged as stretch)
      if(overage>5){
        overCapacityWeeks.push(`wk${i+1}:+${overage}h`);
        const penalty=overage>15?20:10;
        capacityPenalty=Math.min(capacityPenalty+penalty,40);
      }
      // 0-5h over → absorb silently, no flag, no penalty
    }
  }
  const stretched=overCapacityWeeks.length>0;

  // ── TIMING & COVERAGE ──
  const oppActive=opp.hours.map((h,i)=>h>0?i:-1).filter(i=>i>=0);
  if(oppActive.length===0) return{score:10,grade:"?",color:"#94a3b8",reason:"No hours"};
  const firstOppWeek=oppActive[0];
  const firstPersonWeek=person.hours.findIndex((h,i)=>i>=firstOppWeek&&h>=5);
  const delayWeeks=firstPersonWeek===-1?99:Math.max(0,firstPersonWeek-firstOppWeek);

  let coveredWeeks=0,consecutiveDips=0,maxConsec=0;
  for(let i=firstOppWeek;i<opp.hours.length;i++){
    const needH=opp.hours[i];const avail=person.hours[i]||0;
    if(needH<=0) continue;
    const threshold=needH>=30?25:needH>=20?15:needH>=15?10:5;
    if(avail>=threshold){coveredWeeks++;consecutiveDips=0;}
    else{consecutiveDips++;maxConsec=Math.max(maxConsec,consecutiveDips);}
  }
  if(maxConsec>=2) return{score:Math.max(score-10,5),grade:"D",color:"#ef4444",reason:"2+ consecutive gaps"};
  const activeWeeks=oppActive.length;
  const pct=activeWeeks>0?coveredWeeks/activeWeeks:0;
  if(pct>=0.9){score+=30;reasons.push("Strong coverage");}
  else if(pct>=0.7){score+=18;reasons.push("Partial coverage");}
  else if(pct>=0.5){score+=10;reasons.push("Weak coverage");}

  if(delayWeeks===0){score+=20;reasons.push("On time");}
  else if(delayWeeks<=2){score+=10;reasons.push(`${delayWeeks}wk delay`);}
  else if(delayWeeks<=4){score+=3;reasons.push(`${delayWeeks}wk delay`);}

  // Country scoring removed — optimizing for offshore inclusivity

  if(opp.role===person.role){score+=10;reasons.push("Exact role");}
  else if(["Solution Architect","Consultant"].includes(opp.role)&&["Solution Architect","Consultant"].includes(person.role)){score+=5;}
  else if(opp.role==="Technical Architect"&&person.role==="Solution Architect"){score+=3;}

  score=Math.min(100,Math.max(0,score-capacityPenalty));
  if(stretched) reasons.push(`Stretched ${overCapacityWeeks.join(", ")}`);
  const color=score>=80?"#34d399":score>=65?"#86efac":score>=50?"#fbbf24":score>=30?"#fb923c":"#ef4444";
  const grade=score>=80?"A":score>=65?"B":score>=50?"C":score>=30?"D":"F";
  return{score,grade,color,reason:reasons.join(", "),delayWeeks,stretched,overCapacityWeeks};
}

// Build a map of name → array[13] already-committed hours from current assignments
function buildAllocMap(assignments, allOpps){
  const map={};
  for(const [oid,name] of Object.entries(assignments)){
    if(!name||name==="__cleared") continue;
    const opp=allOpps.find(o=>o.id===oid);
    if(!opp) continue;
    if(!map[name]) map[name]=Array(13).fill(0);
    opp.hours.forEach((h,i)=>{if(h>0) map[name][i]+=h;});
  }
  return map;
}

// ── AUTO-ASSIGN ENGINE ──
// Greedy: Commit first, then Strong Upside, then Best Case; biggest hours first within tier
// Capacity-aware: tracks weekly committed hours per person, enforces 40h/wk cap
// One opp per person in auto-assign (manual overrides via picker respect capacity too)
function autoAssign(allPeople, allOpps){
  const assignments={};
  const allocMap={}; // name → Array(13) of committed hours
  const HARD_CAP=40;
  const CAT_ORDER={Commit:0,"Strong Upside":1,"Best Case":2};
  // Sort: Commit first, then Strong Upside, then Best Case
  // Within same category: process lower peak-weekly-demand opps first
  // so that well-matched people get assigned to achievable opps before impossible ones
  const peakWeek=o=>Math.max(...o.hours.map(h=>h||0));
  const sorted=[...allOpps].sort((a,b)=>{
    const cd=(CAT_ORDER[a.cat]||3)-(CAT_ORDER[b.cat]||3);
    if(cd!==0) return cd;
    return peakWeek(a)-peakWeek(b); // lower peak demand first within same category
  });
  for(const opp of sorted){
    // Build assignedNames from current assignments for this opp's scoring
    const assignedNames=new Set(Object.values(assignments).filter(v=>v&&v!=="__cleared"));
    const candidates=allPeople
      .map(p=>{
        const alloc=allocMap[p.name]||Array(13).fill(0);
        // Hard check: committed + new need must not exceed person's actual availability + small buffer
        // This prevents auto-assigning the same person to multiple simultaneous opps
        // Manual override still possible via picker
        const AUTO_STRETCH=5; // allow up to 5h auto-stretch per week
        let wouldBreach=false;
        for(let i=0;i<13;i++){
          const needH=opp.hours[i]||0;
          if(needH<=0) continue;
          const already=alloc[i]||0;
          const avail=Math.max(0,p.hours[i]||0);
          // Block if: total committed would exceed availability+buffer OR exceed 40h absolute
          if(already+needH>avail+AUTO_STRETCH||already+needH>HARD_CAP){wouldBreach=true;break;}
        }
        if(wouldBreach) return{...p,score:0,grade:"F",color:"#ef4444",reason:"Over capacity"};
        return{...p,...scoreMatch(p,opp,assignedNames,alloc)};
      })
      .filter(p=>p.score>=20)
      .sort((a,b)=>b.score-a.score);
    if(candidates.length>0){
      const winner=candidates[0];
      assignments[opp.id]=winner.name;
      if(!allocMap[winner.name]) allocMap[winner.name]=Array(13).fill(0);
      opp.hours.forEach((h,i)=>{if(h>0) allocMap[winner.name][i]+=h;});
    }
  }
  return assignments;
}

// ── TAB ROUTING ──
function assignTab(role,skill){
  const s=skill||"",r=role||"";

  // ── ROLE-FIRST: general-pool roles always go to their dedicated tab ──
  if(r==="Change Management") return "cm";
  if(r==="Quality Assurance") return "qa";
  if(r==="Designer") return "design";
  if(r==="Business Architect") return "pmdo";
  if(["Project Manager","Delivery Owner","Digital Transformation Lead",
      "Technical Delivery Owner","Release Manager"].includes(r)) return "pmdo";
  if(r==="Mulesoft Developer") return "mulesoft";
  if(r==="Support Engineer") return "other";

  // ── SKILL-FIRST: SA / Consultant / Developer / TA routed by skill ──
  if(s==="Agentforce") return "agentforce";
  if(s==="AWS") return "aws";
  if(s==="Service Cloud Voice") return "scv";
  if(s==="Service Cloud") return "sc";
  if(s==="Field Service") return "fs";
  if(["RLM","CPQ","Billing"].includes(s)) return "rlm";
  if(s==="Sales Cloud"||s==="Commerce Cloud") return "salescloud";

  // Exp Cloud + Dig Eng tab: SA and Consultant with these skills only
  // Developer/Digital Engagement → sfta (Developer catch-all)
  if(["Experience Cloud","Digital Experience","Digital Engagement"].includes(s)){
    if(r==="Developer") return "sfta";
    return "expcloud";
  }

  if(s==="MuleSoft") return "mulesoft";
  if(["DocuSign CLM","Ironclad","Ironclad CLM"].includes(s)) return "clm";
  if(s==="Data Cloud") return "datacloud";
  if(s==="Data Architecture") return "sfta";
  if(s==="Conversation Design") return "other";

  // All Developers (except AWS/Agentforce/MuleSoft already caught above) → sfta
  // This consolidates Developer/Salesforce, Front-End, General, blank, SCV, SC, etc.
  if(r==="Developer") return "sfta";

  // TA blank/Salesforce/Integrations → sfta
  if(r==="Technical Architect"&&["Salesforce","Integrations",""].includes(s)) return "sfta";

  if(["Solution Architect","Consultant","Technical Architect"].includes(r)) return "sc";
  return "other";
}

// ── WEEK CELL ──
function WC({v,t}){
  if(!v||v===0)return<td style={{width:32,padding:"1px",textAlign:"center"}}><span style={{color:"#111827",fontSize:8}}>·</span></td>;
  let bg,fg,d=v;
  if(t==="s"){if(v<0){bg="#2d0000";fg="#ef4444";}else if(v>=25){bg="#052e16";fg="#34d399";}else if(v>=10){bg="#0c2a1a";fg="#6ee7b7";}else{bg="#1a2535";fg="#3a5070";}}
  else if(t==="d"){if(v>=35){bg="#3b1500";fg="#fb923c";}else if(v>=20){bg="#2d1a00";fg="#fbbf24";}else{bg="#1c1500";fg="#fde68a";}}
  else{d=v>0?`+${v}`:v;if(v>=15){bg="#052e16";fg="#34d399";}else if(v>=0){bg="#0c2a1a";fg="#86efac";}else if(v>=-10){bg="#2d0f0f";fg="#f87171";}else{bg="#3b0000";fg="#ef4444";}}
  return<td style={{width:32,padding:"1px",textAlign:"center"}}><div style={{background:bg,color:fg,fontSize:8,fontWeight:700,borderRadius:2,padding:"2px 0",minWidth:26,textAlign:"center",margin:"0 auto"}}>{d}</div></td>;
}

// ── SCORE BADGE ──
function ScoreBadge({score,size=10}){
  if(score===undefined||score===null||score===0) return null;
  const color=score>=80?"#34d399":score>=65?"#86efac":score>=50?"#fbbf24":score>=30?"#fb923c":"#ef4444";
  const bg=score>=80?"#052e16":score>=65?"#0c2a1a":score>=50?"#2d1a00":score>=30?"#2d1200":"#2d0000";
  return<span style={{fontSize:size,fontWeight:800,color,background:bg,padding:"1px 5px",borderRadius:4,whiteSpace:"nowrap"}}>{score}</span>;
}

// ── PERSON PICKER ──
function Picker({opp,tabPeople,allPeople,assignments,allOpps,onPick,onClose}){
  const[q,setQ]=useState("");
  const[mode,setMode]=useState("best"); // "best" | "practice" | "all"

  // Exclude current opp slot from assignedNames + allocMap
  const assignedNamesForPicker=useMemo(()=>{
    const names=new Set();
    Object.entries(assignments).forEach(([oid,name])=>{
      if(oid!==opp.id&&name&&name!=="__cleared") names.add(name);
    });
    return names;
  },[assignments,opp.id]);
  const allocMapForPicker=useMemo(()=>{
    const a={...assignments};delete a[opp.id];
    return buildAllocMap(a,allOpps);
  },[assignments,opp.id,allOpps]);

  const lq=q.trim().toLowerCase();

  // Score ALL people
  const allScored=useMemo(()=>
    allPeople.map(p=>{
      const res=scoreMatch(p,opp,assignedNamesForPicker,allocMapForPicker[p.name]);
      const inTab=!!tabPeople.find(tp=>tp.name===p.name);
      return{...p,...res,inTab};
    }).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name))
  ,[allPeople,opp,assignedNamesForPicker,allocMapForPicker,tabPeople]);

  // Filter by search
  const filtered=useMemo(()=>{
    if(!lq) return allScored;
    return allScored.filter(p=>
      p.name.toLowerCase().includes(lq)||
      p.role.toLowerCase().includes(lq)||
      (p.skill||"").toLowerCase().includes(lq)||
      (p.country||"").toLowerCase().includes(lq)
    );
  },[allScored,lq]);

  // mode buckets
  const eligible=filtered.filter(p=>p.score>0);
  const tabAll=filtered.filter(p=>p.inTab);          // everyone on this practice tab
  const tabEligible=eligible.filter(p=>p.inTab);

  // What to show per mode
  const showList=useMemo(()=>{
    if(mode==="best") return eligible.slice(0,20);
    if(mode==="practice") return [...tabAll].sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name));
    return [...filtered].sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name)); // all company

              <div style={{fontSize:12,color:"#818cf8",fontWeight:700,marginTop:3}}>{opp.project.length>55?opp.project.slice(0,53)+"…":opp.project}</div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1}}>✕</button>
          </div>

            {opp.skill&&<span style={{fontSize:9,color:"#818cf8",background:"#1e1b4b",padding:"2px 8px",borderRadius:10}}>{opp.skill}</span>}
            <span style={{fontSize:9,color:"#fbbf24"}}>{opp.tot}h total</span>

  );

          <div style={{fontSize:11,color:file?"#818cf8":"#334155"}}>{file?`✓ ${file.name}`:"Click to select .xlsx"}</div>
        </div>
        <input ref={fileRef} type="file" accept=".xlsx" style={{display:"none"}} onChange={e=>setFile(e.target.files[0])}/>
        {err&&<div style={{fontSize:10,color:"#ef4444",marginBottom:10,padding:"5px 8px",background:"#2d0000",borderRadius:4}}>{err}</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={handle} disabled={loading} style={{flex:1,padding:"9px",background:"#1e1b4b",border:"1px solid #6366f1",color:"#818cf8",borderRadius:6,fontSize:10,fontWeight:700}}>{loading?"Processing…":"Load Data"}</button>
          {hasData&&<button onClick={onClose} style={{padding:"9px 12px",background:"transparent",border:"1px solid #1e293b",color:"#475569",borderRadius:6,fontSize:10}}>Cancel</button>}
        </div>
      </div>
    </div>
  );
}

// ── PARSE XLSX ──
function parseXLSX(ab){
  const wb=XLSX.read(ab,{type:"arraybuffer",cellDates:true});
  const wsS=wb.Sheets["Availability by Person"];
  const sRaw=XLSX.utils.sheet_to_json(wsS,{header:1,raw:false});
  const sHdrs=sRaw[1];
  const sDCols=[];
  for(let i=7;i<sHdrs.length;i++){if(sHdrs[i])sDCols.push(i);}
  const people=[];const seenP=new Set();
  for(let r=2;r<sRaw.length;r++){
    const row=sRaw[r];if(!row||!row[6]||!row[3])continue;
    const name=String(row[6]).trim(),role=String(row[3]).trim(),skill=String(row[4]||"").trim();
    const key=`${name}|${role}|${skill}`;if(seenP.has(key))continue;seenP.add(key);
    const hours=sDCols.map(c=>{const v=parseFloat(row[c]);return isNaN(v)?0:Math.round(v);});
    people.push({id:key,name,role,skill,country:String(row[0]||"").trim(),dept:String(row[1]||"").trim(),hours,tot:hours.reduce((s,h)=>s+(h>0?h:0),0)});
  }
  const wsD=wb.Sheets["Allocation by PersonProject"];
  const dRaw=XLSX.utils.sheet_to_json(wsD,{header:1,raw:false});
  const dHdrs=dRaw[1];
  const dDCols=[];
  for(let i=12;i<Math.min(dHdrs.length,26);i++){const v=String(dHdrs[i]||"");if(v.startsWith("2026-")&&v!=="2026-3-1")dDCols.push(i);}
  const VCATS=new Set(["Commit","Strong Upside","Best Case"]);
  const opps=[];const seenO=new Set();
  for(let r=2;r<dRaw.length;r++){
    const row=dRaw[r];if(!row||row[1]!=="opty")continue;
    const cat=String(row[3]||"").trim(),status=String(row[2]||"").trim();
    if(!VCATS.has(cat)||status==="Closed Won")continue;
    const role=String(row[6]||"").trim(),skill=String(row[7]||"").trim(),project=String(row[9]||"").trim();
    if(!project||!role)continue;
    const key=`${project}|${role}|${skill}`;if(seenO.has(key))continue;seenO.add(key);
    const hours=dDCols.map(c=>{const v=parseFloat(row[c]);return isNaN(v)?0:Math.round(v);});
    const tot=hours.reduce((s,h)=>s+(h>0?h:0),0);
    if(tot===0)continue;
    opps.push({id:key,project,role,skill,cat,status,hours,tot});
  }
  return{people,opps};
}

// ── BUILD DATA STRUCTURE ──
function buildAppData(people,opps){
  const tabsMap={};
  TAB_META.forEach(t=>{tabsMap[t.id]={...t,people:[],opps:[]};});
  // Normalize role aliases before routing
  // "AWS Developer" → "Developer" (so they group with Developer/AWS supply in the AWS tab)
  // "Mulesoft Developer" stays as-is (handled by assignTab)
  const normRole=r=>r==="AWS Developer"?"Developer":r;
  people.forEach((p,i)=>{p.id=p.id||`p_${i}`;p.role=normRole(p.role);const t=assignTab(p.role,p.skill);(tabsMap[t]||tabsMap["sc"]).people.push(p);});
  const CAT_SORT={Commit:0,"Strong Upside":1,"Best Case":2};
  const sortByCat=arr=>arr.sort((a,b)=>(CAT_SORT[a.cat]??3)-(CAT_SORT[b.cat]??3)||b.tot-a.tot);
  opps.forEach((o,i)=>{o.id=o.id||`o_${i}`;o.role=normRole(o.role);const t=assignTab(o.role,o.skill);(tabsMap[t]||tabsMap["sc"]).opps.push(o);});
  TAB_META.forEach(t=>{if(tabsMap[t.id])sortByCat(tabsMap[t.id].opps);});
  sortByCat(opps);
  const tabs=TAB_META.map(t=>tabsMap[t.id]).filter(t=>t.people.length>0||t.opps.length>0);
  return{tabs,allPeople:people,allOpps:opps};
}

// ── EXCEL EXPORT ──
function exportExcel(allOpps,allPeople,assignments){
  const wb=XLSX.utils.book_new();
  const assignedNames=new Set(Object.values(assignments).filter(v=>v&&v!=="__cleared"));
  const allocMap=buildAllocMap(assignments,allOpps);
  const CAT_O={Commit:0,"Strong Upside":1,"Best Case":2};
  const sortOpps=arr=>[...arr].sort((a,b)=>(CAT_O[a.cat]||3)-(CAT_O[b.cat]||3)||b.tot-a.tot);

  const covRows=sortOpps(allOpps).map(o=>{
    const aname=assignments[o.id]==="__cleared"?null:assignments[o.id];
    if(aname){const p=allPeople.find(x=>x.name===aname);const sc=p?scoreMatch(p,o,new Set(),allocMap[p.name]):null;return{...o,status2:"Assigned",match:aname,score:sc?.score||"—",stretched:sc?.stretched};}
    const cands=allPeople.filter(p=>!assignedNames.has(p.name)).map(p=>({...p,...scoreMatch(p,o,assignedNames,allocMap[p.name])})).sort((a,b)=>b.score-a.score);
    const best=cands[0];
    if(best&&best.score>=80)return{...o,status2:"Covered",match:best.name,score:best.score};
    if(best&&best.score>=50)return{...o,status2:"Partial",match:best.name,score:best.score};
    return{...o,status2:"Gap – Hire",match:"",score:best?.score||0};
  });

  // ── SHEET 1: Summary ──
  const counts={Assigned:0,Covered:0,Partial:0,Gap:0};
  covRows.forEach(r=>{if(r.status2==="Assigned")counts.Assigned++;else if(r.status2==="Covered")counts.Covered++;else if(r.status2==="Partial")counts.Partial++;else counts.Gap++;});
  const sumData=[
    ["NeuraFlash Capacity Planning","","Generated:",new Date().toLocaleDateString()],
    [],["Metric","Value"],
    ["Total Opportunities",allOpps.length],["Total People",allPeople.length],
    ["Assigned",counts.Assigned],["Auto-Covered (≥80)",counts.Covered],
    ["Partial (50-79)",counts.Partial],["Gaps – Hire",counts.Gap],
    ["Total Demand (hrs)",allOpps.reduce((s,o)=>s+o.tot,0)],
    ["Total Supply (hrs)",allPeople.reduce((s,p)=>s+p.tot,0)],
    [],["By Category","Opps","Covered","Gaps","Hrs"],
    ...["Commit","Strong Upside","Best Case"].map(cat=>{
      const co=covRows.filter(r=>r.cat===cat);
      return[cat,co.length,co.filter(r=>r.status2==="Assigned"||r.status2==="Covered").length,co.filter(r=>r.status2==="Gap – Hire").length,co.reduce((s,o)=>s+o.tot,0)];
    }),
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sumData),"Summary");

  // ── SHEET 2: Hires Needed — one row per gap opp, with weekly hours ──
  // Compute hire-by week per role (same logic as HiresTab)
  const CAPACITY=40;
  const roleWeeklyMap={};
  const gapOpps=covRows.filter(r=>r.status2==="Gap – Hire");
  gapOpps.forEach(o=>{
    if(!roleWeeklyMap[o.role]) roleWeeklyMap[o.role]=Array(13).fill(0);
    o.hours.forEach((h,i)=>{if(h>0)roleWeeklyMap[o.role][i]+=h;});
  });
  const hireByDateForRole={};
  Object.entries(roleWeeklyMap).forEach(([role,wd])=>{
    const peak=Math.max(...wd);
    const hires=Math.max(1,Math.ceil(peak/CAPACITY)-((peak-(Math.ceil(peak/CAPACITY)-1)*CAPACITY)<=5?1:0));
    const threshold=(hires-1)*CAPACITY+5;
    let hbw=wd.findIndex(h=>h>threshold);
    if(hbw<0) hbw=wd.indexOf(peak);
    hireByDateForRole[role]=DATES[Math.max(0,hbw-2)]||DATES[0];
  });

  const hiresHdr=[
    "Role","Skill","Project","Booking Forecast","Stage","Total Hrs Needed","Hire By",
    ...DATES.map(d=>`Hrs/Wk ${d}`)
  ];
  const hiresRows=gapOpps
    .sort((a,b)=>(CAT_O[a.cat]||3)-(CAT_O[b.cat]||3)||a.role.localeCompare(b.role)||b.tot-a.tot)
    .map(o=>[
      o.role,
      o.skill||"—",
      o.project,
      o.cat,
      o.status,
      o.tot,
      hireByDateForRole[o.role]||"",
      ...o.hours
    ]);

  // Blank separator + role subtotal rows
  const hiresData=[hiresHdr];
  let lastRole=null;
  hiresRows.forEach(row=>{
    if(lastRole!==null&&row[0]!==lastRole){
      // Role subtotal
      const roleRows=hiresRows.filter(r=>r[0]===lastRole);
      const roleTotals=Array(13).fill(0);
      roleRows.forEach(r=>r.slice(7).forEach((h,i)=>{roleTotals[i]+=(h||0);}));
      hiresData.push([`  TOTAL — ${lastRole}`,"","","","",roleRows.reduce((s,r)=>s+(r[5]||0),0),"",...roleTotals]);
      hiresData.push([]); // blank spacer
    }
    hiresData.push(row);
    lastRole=row[0];
  });
  // Final role subtotal
  if(lastRole){
    const roleRows=hiresRows.filter(r=>r[0]===lastRole);
    const roleTotals=Array(13).fill(0);
    roleRows.forEach(r=>r.slice(7).forEach((h,i)=>{roleTotals[i]+=(h||0);}));
    hiresData.push([`  TOTAL — ${lastRole}`,"","","","",roleRows.reduce((s,r)=>s+(r[5]||0),0),"",...roleTotals]);
  }

  const hiresSheet=XLSX.utils.aoa_to_sheet(hiresData);
  // Set column widths
  hiresSheet["!cols"]=[
    {wch:28},{wch:20},{wch:42},{wch:16},{wch:14},{wch:14},{wch:12},
    ...Array(13).fill({wch:10})
  ];
  XLSX.utils.book_append_sheet(wb,hiresSheet,"Hires Needed");

  // ── SHEET 3: Opp Coverage ──
  const covHdr=["Opportunity","Category","Stage","Role","Skill","Status","Assigned / Best Match","Score","Total Hrs","Avg Hrs/Wk",...DATES];
  const covData=covRows.map(o=>{const aw=o.hours.filter(h=>h>0).length;return[o.project,o.cat,o.status,o.role,o.skill||"",o.status2,o.match||"",o.score,o.tot,aw?Math.round(o.tot/aw):0,...o.hours];});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([covHdr,...covData]),"Opp Coverage");

  XLSX.writeFile(wb,`NeuraFlash_Staffing_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── PRACTICE TAB — role-grouped supply+demand pairs ──
function PracticeTab({tab,allPeople,allOpps,assignments,setAssignments}){
  const[picker,setPicker]=useState(null);
  const[collapsed,setCollapsed]=useState({});
  const toggleSection=(role,section)=>setCollapsed(prev=>({...prev,[role]:{...prev[role],[section]:!prev[role]?.[section]}}));

  // Group supply by role, sorted by ROLE_ORDER
  const roleGroups=useMemo(()=>{
    const groups={};
    tab.people.forEach(p=>{if(!groups[p.role])groups[p.role]=[];groups[p.role].push(p);});
    // Also collect demand roles not in supply
    tab.opps.forEach(o=>{if(!groups[o.role])groups[o.role]=[];});
    return Object.keys(groups).sort((a,b)=>{
      const ia=ROLE_ORDER.indexOf(a),ib=ROLE_ORDER.indexOf(b);
      return(ia===-1?99:ia)-(ib===-1?99:ib);
    });
  },[tab]);

  const sortedOpps=useMemo(()=>[...tab.opps].sort((a,b)=>(CAT_ORDER_MAP[a.cat]||3)-(CAT_ORDER_MAP[b.cat]||3)||b.tot-a.tot),[tab.opps]);

  const assign=(oid,name)=>setAssignments(prev=>({...prev,[oid]:name}));
  const unassign=oid=>setAssignments(p=>{const n={...p};delete n[oid];return n;});
  const assignedNames=useMemo(()=>new Set(Object.values(assignments).filter(v=>v&&v!=="__cleared")),[assignments]);
  const allocMap=useMemo(()=>buildAllocMap(assignments,allOpps),[assignments,allOpps]);

  // Pre-compute best candidates for all demand opps (memoized - only reruns on assignment change)
  const demandScores=useMemo(()=>{
    const map={};
    const aNames=new Set(Object.values(assignments).filter(v=>v&&v!=="__cleared"));
    tab.opps.forEach(o=>{
      const _raw=assignments[o.id];
      const cleared=_raw==="__cleared";
      const aname=cleared?null:(_raw||null);
      if(aname){
        const person=allPeople.find(p=>p.name===aname);
        // Build allocMap excluding THIS opp so we don't double-count its hours
        // when checking whether the assigned person is stretched
        const allocExcluding=buildAllocMap(
          Object.fromEntries(Object.entries(assignments).filter(([k])=>k!==o.id)),
          allOpps
        );
        map[o.id]={aname,person,sc:person?scoreMatch(person,o,new Set(),allocExcluding[person.name]):null,best:null,cleared:false};
      } else if(!cleared){
        const cands=allPeople
          .filter(p=>!aNames.has(p.name))
          .map(p=>({...p,...scoreMatch(p,o,aNames,allocMap[p.name])}))
          .sort((a,b)=>b.score-a.score);
        map[o.id]={aname:null,person:null,sc:null,best:cands[0]||null,cleared:false};
      } else {
        map[o.id]={aname:null,person:null,sc:null,best:null,cleared:true};
      }
    });
    return map;
  },[tab.opps,assignments,allPeople,allocMap,allOpps]);

  const sw=Array(13).fill(0),dw=Array(13).fill(0);
  tab.people.forEach(p=>p.hours.forEach((v,i)=>{if(v>0)sw[i]+=v;}));
  tab.opps.forEach(o=>o.hours.forEach((v,i)=>{if(v>0)dw[i]+=v;}));
  const nw=sw.map((s,i)=>s-dw[i]);

  const totalGaps=sortedOpps.filter(o=>!assignments[o.id]).length;
  const totalAssigned=sortedOpps.filter(o=>!!assignments[o.id]).length;

  return(
    <div>
      {/* Tab summary bar */}
      <div style={{padding:"6px 14px",background:"#060b15",borderBottom:"1px solid #0a1020",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:10,fontWeight:800,color:"#f1f5f9"}}>{tab.label}</span>
        <span style={{fontSize:9,color:"#34d399"}}>{tab.people.length} people · {tab.people.reduce((s,p)=>s+p.tot,0)}h supply</span>
        <span style={{fontSize:9,color:"#fbbf24"}}>{tab.opps.length} role-slots · {tab.opps.reduce((s,o)=>s+o.tot,0)}h demand</span>
        <span style={{fontSize:9,color:"#818cf8"}}>{totalAssigned} assigned</span>
        {totalGaps>0&&<span style={{fontSize:9,color:"#ef4444",background:"#2d0000",padding:"1px 8px",borderRadius:10}}>⚠ {totalGaps} unassigned</span>}
      </div>

      {/* Role groups */}
      {roleGroups.map(role=>{
        const supply=tab.people.filter(p=>p.role===role);
        const demand=sortedOpps.filter(o=>o.role===role).sort((a,b)=>(CAT_ORDER_MAP[a.cat]||3)-(CAT_ORDER_MAP[b.cat]||3)||b.tot-a.tot);
        if(supply.length===0&&demand.length===0) return null;
        const sw2=Array(13).fill(0);
        supply.forEach(p=>p.hours.forEach((v,i)=>{if(v>0)sw2[i]+=v;}));
        const dw2=Array(13).fill(0);
        demand.forEach(o=>o.hours.forEach((v,i)=>{if(v>0)dw2[i]+=v;}));
        const nw2=sw2.map((s,i)=>s-dw2[i]);
        const supplyTotal=supply.reduce((s,p)=>s+p.tot,0);

                              <span style={{fontSize:7,color:CAT_FG[o.cat],background:CAT_BG[o.cat],padding:"0 5px",borderRadius:4,fontWeight:700,lineHeight:"14px",whiteSpace:"nowrap"}}>{o.cat}</span>
                            </div>
                          </div>

                      <td style={{padding:"4px 8px",verticalAlign:"middle"}}>
                        {aname?(

                          <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>

                            {sc&&sc.score===0&&sc.reason&&sc.reason.includes("mismatch")&&<span style={{fontSize:7,fontWeight:800,color:"#f59e0b",background:"#451a03",padding:"1px 5px",borderRadius:3}} title={sc.reason}>⚠ MISMATCH</span>}
                            {sc&&sc.score===0&&sc.reason&&!sc.reason.includes("cap")&&sc.reason!=="Over capacity"&&!sc.reason.includes("mismatch")&&<span style={{fontSize:7,fontWeight:800,color:"#94a3b8",background:"#1e293b",padding:"1px 5px",borderRadius:3}} title={sc.reason}>⚠ UNAVAILABLE</span>}
                            {sc&&sc.stretched&&sc.score>0&&<span style={{fontSize:7,fontWeight:800,color:"#f59e0b",background:"#451a03",padding:"1px 4px",borderRadius:3}}>⚠ STRETCH</span>}
                            {sc&&sc.score>0&&<ScoreBadge score={sc.score} size={8}/>}
                            <button onClick={()=>setPicker({opp:o})} style={{fontSize:7,padding:"2px 7px",background:"transparent",border:"1px solid #1e293b",color:"#94a3b8",borderRadius:3,cursor:"pointer"}}>Change</button>
                            <button onClick={()=>setAssignments(p=>{const n={...p};delete n[o.id];return n;})} title="Remove assignment — mark as Hire Needed" style={{fontSize:9,padding:"1px 5px",background:"transparent",border:"1px solid #334155",color:"#475569",borderRadius:3,cursor:"pointer",lineHeight:1}}>✕</button>
                          </div>

                          // ── STATE B: No assignment — show Hire Needed + Select Person ──
                          <div style={{display:"flex",alignItems:"center",gap:5}}>
                            <span style={{fontSize:9,color:"#ef4444",fontStyle:"italic",fontWeight:700}}>Hire Needed</span>
                            
                            <button onClick={()=>setPicker({opp:o})} style={{fontSize:7,padding:"2px 8px",background:"#0d1424",border:"1px solid #4f46e5",color:"#818cf8",borderRadius:3,cursor:"pointer"}}>Select Person</button>

                      </td>
                      <td style={{padding:"3px 6px",display:"none"}}>{/* total removed */}</td>
                      {o.hours.map((v,j)=><WC key={j} v={v} t="d"/>)}
                    </tr>);
                  })}
                  {/* Demand total */}
                  <tr style={{background:"#040912",borderTop:"1px solid #0a1020"}}>
                    <td style={{padding:"2px 12px",position:"sticky",left:0,background:"#040912",zIndex:4}}><span style={{fontSize:8,fontWeight:700,color:"#fbbf24"}}>Demand Total</span></td>
                    <td/><td style={{display:"none"}}></td>
                    {dw2.map((v,i)=><td key={i} style={{padding:"1px",textAlign:"center"}}><div style={{fontSize:7,fontWeight:700,color:"#fbbf24",background:"#451a03",borderRadius:2,padding:"1px 0",textAlign:"center"}}>{v||"·"}</div></td>)}

      {picker&&<Picker opp={picker.opp} tabPeople={tab.people} allPeople={allPeople} allOpps={allOpps} assignments={assignments}
        onPick={(name)=>{assign(picker.opp.id,name);setPicker(null);}}

    </div>
  );
}

// ── HIRES NEEDED TAB ──
// Returns the "typical" weekly allocation: mode of non-zero hours, rounded to nearest 5
function typicalHrs(hours){
  const active=hours.filter(h=>h>0);
  if(!active.length) return 0;
  // round each to nearest 5, find mode
  const rounded=active.map(h=>Math.round(h/5)*5||5);
  const freq={};
  rounded.forEach(v=>{freq[v]=(freq[v]||0)+1;});
  return parseInt(Object.entries(freq).sort((a,b)=>b[1]-a[1]||b[0]-a[0])[0][0]);
}
// Allocation tier label — based on typical hrs/wk committed to this opp
function allocLabel(h){
  if(h>=35) return{label:"Full-time",sub:`${h}h/wk`,color:"#fb923c",bg:"#2d1200"};
  if(h>=25) return{label:"Heavy Part-time",sub:`${h}h/wk`,color:"#fbbf24",bg:"#2d1a00"};
  if(h>=15) return{label:"Part-time",sub:`${h}h/wk`,color:"#86efac",bg:"#0c2a1a"};
  if(h>=5)  return{label:"Advisory",sub:`${h}h/wk`,color:"#94a3b8",bg:"#1e293b"};
  return{label:"Minimal",sub:`${h}h/wk`,color:"#334155",bg:"#0f172a"};
}

function HiresTab({opps,allPeople,assignments}){
  const assignedNames=useMemo(()=>new Set(Object.values(assignments).filter(v=>v&&v!=="__cleared")),[assignments]);
  const CAT_O={Commit:0,"Strong Upside":1,"Best Case":2};
  const[view,setView]=useState("gantt"); // "gantt" | "detail"

  const gapOpps=useMemo(()=>
    opps.filter(o=>{
      if(assignments[o.id]) return false;
      const best=allPeople.filter(p=>!assignedNames.has(p.name)).map(p=>scoreMatch(p,o,assignedNames)).sort((a,b)=>b.score-a.score)[0];
      return !best||best.score<50;
    }).sort((a,b)=>(CAT_O[a.cat]||3)-(CAT_O[b.cat]||3)||b.tot-a.tot)
  ,[opps,allPeople,assignments,assignedNames]);

  const groups=useMemo(()=>{
    const byRole={};
    gapOpps.forEach(o=>{
      const k=o.role;
      if(!byRole[k]) byRole[k]={role:o.role,skillGroups:{},opps:[],totalHrs:0};
      byRole[k].opps.push(o);
      byRole[k].totalHrs+=o.tot;
      const sk=o.skill||"(General)";
      if(!byRole[k].skillGroups[sk]) byRole[k].skillGroups[sk]={skill:sk,opps:[],totalHrs:0};
      byRole[k].skillGroups[sk].opps.push(o);
      byRole[k].skillGroups[sk].totalHrs+=o.tot;
    });
    const CAPACITY=40;
    Object.values(byRole).forEach(grp=>{
      const weeklyDemand=Array(13).fill(0);
      grp.opps.forEach(o=>o.hours.forEach((h,i)=>{if(h>0)weeklyDemand[i]+=h;}));
      const peak=Math.max(...weeklyDemand);
      let hires=Math.ceil(peak/CAPACITY)||1;
      if(hires>1&&(peak-(hires-1)*CAPACITY)<=5) hires--;
      grp.hiresNeeded=hires;
      grp.weeklyDemand=weeklyDemand;
      grp.peakWeek=weeklyDemand.indexOf(peak);
      grp.peakDemand=peak;
      // Compute "hire-by" week: first week demand exceeds (hires-1)*CAPACITY+5
      const threshold=(hires-1)*CAPACITY+5;
      grp.hireByWeek=weeklyDemand.findIndex(h=>h>threshold);
      if(grp.hireByWeek<0) grp.hireByWeek=grp.peakWeek;
      // Give 2-week lead time for sourcing
      grp.hireByWeek=Math.max(0,grp.hireByWeek-2);
      Object.values(grp.skillGroups).forEach(sg=>{
        const sgWeekly=Array(13).fill(0);
        sg.opps.forEach(o=>o.hours.forEach((h,i)=>{if(h>0)sgWeekly[i]+=h;}));
        const sgPeak=Math.max(...sgWeekly);
        let sgHires=Math.ceil(sgPeak/CAPACITY)||1;
        if(sgHires>1&&(sgPeak-(sgHires-1)*CAPACITY)<=5) sgHires--;
        sg.hiresNeeded=sgHires;
        sg.weeklyDemand=sgWeekly;
        sg.peakDemand=sgPeak;
        const sgThreshold=(sgHires-1)*CAPACITY+5;
        sg.hireByWeek=sgWeekly.findIndex(h=>h>sgThreshold);
        if(sg.hireByWeek<0) sg.hireByWeek=sgWeekly.indexOf(sgPeak);
        sg.hireByWeek=Math.max(0,sg.hireByWeek-2);
      });
    });
    // Sort skill group opps by cat
    Object.values(byRole).forEach(grp=>{
      grp.opps.sort((a,b)=>(CAT_O[a.cat]||3)-(CAT_O[b.cat]||3)||b.tot-a.tot);
      Object.values(grp.skillGroups).forEach(sg=>{
        sg.opps.sort((a,b)=>(CAT_O[a.cat]||3)-(CAT_O[b.cat]||3)||b.tot-a.tot);
      });
    });
    // Sort role groups by highest-priority cat within them, then hiresNeeded
    return Object.values(byRole).sort((a,b)=>{
      const aCat=Math.min(...a.opps.map(o=>CAT_O[o.cat]??3));
      const bCat=Math.min(...b.opps.map(o=>CAT_O[o.cat]??3));
      return aCat!==bCat?aCat-bCat:b.hiresNeeded-a.hiresNeeded||b.totalHrs-a.totalHrs;
    });
  },[gapOpps]);

  if(groups.length===0) return(
    <div style={{padding:60,textAlign:"center"}}>
      <div style={{fontSize:24,marginBottom:8}}>✅</div>
      <div style={{fontSize:13,color:"#34d399",fontWeight:700}}>No hiring gaps — all roles covered!</div>
    </div>
  );

  const totalHires=groups.reduce((s,g)=>s+g.hiresNeeded,0);

  const HEADER_ACCENTS=[
    {bg:"#0d1f3c",border:"#1e3a5f",roleColor:"#60a5fa"},
    {bg:"#1a0d2e",border:"#3b1a5f",roleColor:"#a78bfa"},
    {bg:"#0d2e1a",border:"#1a5f3b",roleColor:"#34d399"},
    {bg:"#2e1a0d",border:"#5f3b1a",roleColor:"#fb923c"},
    {bg:"#2e0d1a",border:"#5f1a3b",roleColor:"#f472b6"},
    {bg:"#1a2e0d",border:"#3b5f1a",roleColor:"#a3e635"},
  ];

  // ── GANTT VIEW ──
  const GanttView=()=>{
    // Each row = one role. Columns = 13 weeks. Show demand bar + hire-by marker.
    const maxDemand=Math.max(...groups.map(g=>g.peakDemand),1);
    return(
      <div style={{overflowX:"auto",padding:"12px 0"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:900}}>
          <thead>
            <tr style={{background:"#04080f"}}>
              <th style={{padding:"6px 16px",textAlign:"left",fontSize:9,color:"#334155",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",width:200,position:"sticky",left:0,background:"#04080f",zIndex:2}}>Role</th>
              <th style={{padding:"6px 8px",textAlign:"center",fontSize:9,color:"#334155",fontWeight:700,width:60}}>Hires</th>
              <th style={{padding:"6px 8px",textAlign:"center",fontSize:9,color:"#334155",fontWeight:700,width:75}}>Hire By</th>
              {DATES.map((d,i)=>(
                <th key={i} style={{padding:"4px 2px",textAlign:"center",fontSize:8,color:"#1e3a5f",fontWeight:400,width:52,whiteSpace:"nowrap"}}>{d}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {groups.map((g,gi)=>{
              const accent=HEADER_ACCENTS[gi%HEADER_ACCENTS.length];
              const hireByDate=DATES[g.hireByWeek]||DATES[0];
              // Per-skill rows under the role
              const skillList=Object.values(g.skillGroups).sort((a,b)=>b.totalHrs-a.totalHrs);
              return(
                <React.Fragment key={gi}>
                  {/* Role row */}
                  <tr style={{background:accent.bg,borderLeft:`3px solid ${accent.border}`}}>
                    <td style={{padding:"8px 16px",position:"sticky",left:0,background:accent.bg,zIndex:1}}>
                      <div style={{fontSize:12,fontWeight:800,color:accent.roleColor}}>{g.role}</div>
                      <div style={{fontSize:8,color:"#475569",marginTop:1}}>{g.opps.length} slot{g.opps.length!==1?"s":""} · {g.totalHrs}h total</div>
                    </td>
                    <td style={{padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:900,color:"#ef4444",lineHeight:1}}>{g.hiresNeeded}</div>
                      <div style={{fontSize:7,color:"#7f1d1d",fontWeight:700,textTransform:"uppercase"}}>hire{g.hiresNeeded!==1?"s":""}</div>
                    </td>
                    <td style={{padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:10,fontWeight:800,color:"#fbbf24",background:"#2d1a00",padding:"3px 6px",borderRadius:4,whiteSpace:"nowrap"}}>{hireByDate}</div>
                      <div style={{fontSize:7,color:"#78350f",marginTop:2}}>target start</div>
                    </td>
                    {g.weeklyDemand.map((wh,wi)=>{
                      const pct=Math.round((wh/maxDemand)*100);
                      const isHireBy=wi===g.hireByWeek;
                      const isPeak=wi===g.peakWeek;
                      const barH=Math.max(2,Math.round(pct*28/100));
                      const barColor=wh===0?"#0d1424":isPeak?"#ef4444":wh>30?"#f87171":"#fca5a5";
                      return(
                        <td key={wi} style={{padding:"4px 2px",textAlign:"center",verticalAlign:"bottom",position:"relative",borderLeft:isHireBy?"2px solid #fbbf24":"none",background:isHireBy?"#1a120022":"transparent"}}>
                          {isHireBy&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",fontSize:7,color:"#fbbf24",fontWeight:800,whiteSpace:"nowrap",lineHeight:1,padding:"1px 0"}}>⚑ hire by</div>}
                          {wh>0&&(
                            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:32}}>
                              <div style={{fontSize:7,color:barColor,fontWeight:700,lineHeight:1,marginBottom:1}}>{wh}</div>
                              <div style={{width:38,height:barH,background:barColor,borderRadius:"2px 2px 0 0",minHeight:2}}/>
                            </div>
                          )}
                          {wh===0&&<div style={{height:32,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><div style={{width:38,height:2,background:"#0d1424",borderRadius:1}}/></div>}
                        </td>
                      );
                    })}
                  </tr>
                  {/* Skill sub-rows */}
                  {skillList.length>1&&skillList.map((sg,si)=>{
                    const sgHireByDate=DATES[sg.hireByWeek]||DATES[0];
                    return(
                      <tr key={si} style={{background:"#060c18",borderLeft:"3px solid #0f172a"}}>
                        <td style={{padding:"4px 16px 4px 28px",position:"sticky",left:0,background:"#060c18",zIndex:1}}>
                          <div style={{fontSize:9,color:"#475569"}}>↳ <span style={{color:"#64748b",fontWeight:600}}>{sg.skill}</span></div>
                        </td>
                        <td style={{padding:"4px 8px",textAlign:"center"}}>
                          <span style={{fontSize:10,fontWeight:700,color:"#f87171"}}>{sg.hiresNeeded}</span>
                        </td>
                        <td style={{padding:"4px 8px",textAlign:"center"}}>
                          <span style={{fontSize:9,color:"#d97706",background:"#1c1000",padding:"2px 5px",borderRadius:3,whiteSpace:"nowrap"}}>{sgHireByDate}</span>
                        </td>
                        {sg.weeklyDemand.map((wh,wi)=>{
                          const isHireBy=wi===sg.hireByWeek;
                          const barH=Math.max(1,Math.round((wh/maxDemand)*20));
                          return(
                            <td key={wi} style={{padding:"2px",textAlign:"center",verticalAlign:"bottom",borderLeft:isHireBy?"2px dashed #78350f":"none",background:isHireBy?"#1a120011":"transparent"}}>
                              {wh>0&&(
                                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:22}}>
                                  <div style={{fontSize:6,color:"#64748b",lineHeight:1,marginBottom:1}}>{wh}</div>
                                  <div style={{width:36,height:barH,background:"#334155",borderRadius:"1px 1px 0 0",minHeight:1}}/>
                                </div>
                              )}
                              {wh===0&&<div style={{height:22}}/>}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                  {/* Spacer */}
                  <tr><td colSpan={16} style={{height:2,background:"#020509"}}></td></tr>
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
        {/* Legend */}
        <div style={{padding:"8px 16px",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",borderTop:"1px solid #0a1020"}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:12,height:12,background:"#ef4444",borderRadius:2}}/>
            <span style={{fontSize:8,color:"#475569"}}>Peak demand week</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:2,height:16,background:"#fbbf24"}}/>
            <span style={{fontSize:8,color:"#475569"}}>⚑ Hire-by date (2 wks before need)</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:8,color:"#64748b"}}>Bar height = weekly hrs demanded. Numbers inside bars = hrs.</span>
          </div>
        </div>
      </div>
    );
  };

  // ── DETAIL VIEW (original table) ──
  const DetailView=()=>(
    <div>
      {groups.map((g,gi)=>{
        const accent=HEADER_ACCENTS[gi%HEADER_ACCENTS.length];
        const peakDate=DATES[g.peakWeek]||"";
        const hireByDate=DATES[g.hireByWeek]||"";
        const skillList=Object.values(g.skillGroups).sort((a,b)=>b.totalHrs-a.totalHrs);
        return(
          <div key={gi} style={{borderBottom:"2px solid #0a1020",marginBottom:2}}>

              <div style={{flex:"0 0 auto"}}>
                <div style={{fontSize:18,fontWeight:900,color:accent.roleColor,letterSpacing:"-0.02em"}}>{g.role}</div>
                <div style={{fontSize:9,color:"#475569",marginTop:2}}>{g.opps.length} open slot{g.opps.length!==1?"s":""} · peak {Math.round(g.peakDemand)}h/wk @ {peakDate}</div>
              </div>
              <div style={{background:"#2d0000",border:"2px solid #ef4444",borderRadius:10,padding:"6px 18px",textAlign:"center",flex:"0 0 auto"}}>
                <div style={{fontSize:22,fontWeight:900,color:"#ef4444",lineHeight:1}}>{g.hiresNeeded}</div>
                <div style={{fontSize:8,color:"#7f1d1d",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>hire{g.hiresNeeded!==1?"s":""} needed</div>

              <div style={{background:"#2d1a00",border:"1px solid #78350f",borderRadius:8,padding:"6px 14px",textAlign:"center",flex:"0 0 auto"}}>
                <div style={{fontSize:13,fontWeight:800,color:"#fbbf24"}}>{hireByDate}</div>
                <div style={{fontSize:7,color:"#78350f",fontWeight:700,textTransform:"uppercase"}}>hire by</div>

              <div style={{display:"flex",gap:6,flexWrap:"wrap",flex:1}}>
                {skillList.map(sg=>(
                  <div key={sg.skill} style={{background:"#111827",border:"1px solid #1e293b",borderRadius:6,padding:"4px 10px"}}>
                    <div style={{fontSize:9,fontWeight:700,color:"#94a3b8"}}>{sg.skill}</div>
                    <div style={{fontSize:8,color:"#475569",marginTop:1}}>{sg.hiresNeeded} hire{sg.hiresNeeded!==1?"s":""} · {sg.totalHrs}h · hire by {DATES[sg.hireByWeek]||""}</div>

  );
}

// ── ALL DEMAND TAB ──
function DemandTab({opps}){
  const[search,setSearch]=useState("");
  const[catF,setCatF]=useState("all");
  const[expanded,setExpanded]=useState(new Set()); // expanded project names

  const filtered=[...opps].filter(o=>{
    const ms=!search||o.project.toLowerCase().includes(search.toLowerCase())||o.role.toLowerCase().includes(search.toLowerCase())||o.skill.toLowerCase().includes(search.toLowerCase());
    return ms&&(catF==="all"||o.cat===catF);
  // Hardcoded: Commit first, then Strong Upside, then Best Case, then by hours desc
  }).sort((a,b)=>{
    const order={"Commit":0,"Strong Upside":1,"Best Case":2};
    const cd=(order[a.cat]??3)-(order[b.cat]??3);
    return cd!==0?cd:b.tot-a.tot;
  });

  // Group by project — use highest-priority cat (Commit > Strong Upside > Best Case) for project header
  const CAT_O={Commit:0,"Strong Upside":1,"Best Case":2};
  const projectMap=new Map();
  filtered.forEach(o=>{
    if(!projectMap.has(o.project)) projectMap.set(o.project,{project:o.project,cat:o.cat,status:o.status,roles:[],totalHrs:0,hours:Array(13).fill(0)});
    const pg=projectMap.get(o.project);
    // Upgrade project cat to most-committed category seen
    if((CAT_O[o.cat]||3)<(CAT_O[pg.cat]||3)) pg.cat=o.cat;
    pg.roles.push(o);
    pg.totalHrs+=o.tot;
    o.hours.forEach((h,i)=>{if(h>0) pg.hours[i]+=h;});
  });

  const groups=[...projectMap.values()].sort((a,b)=>(CAT_O[a.cat]||3)-(CAT_O[b.cat]||3)||b.totalHrs-a.totalHrs);

  const toggleAll=()=>{
    if(expanded.size===groups.length) setExpanded(new Set());
    else setExpanded(new Set(groups.map(g=>g.project)));
  };

  return(
    <div style={{paddingBottom:20}}>
      <div style={{padding:"8px 14px",borderBottom:"1px solid #0a1020",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search project, role, skill…"
          style={{padding:"5px 10px",background:"#111827",border:"1px solid #1e293b",borderRadius:5,color:"#e2e8f0",fontSize:10,outline:"none",width:250}}/>
        {["all","Commit","Strong Upside","Best Case"].map(c=>(
          <button key={c} onClick={()=>setCatF(c)} style={{padding:"3px 9px",border:`1px solid ${catF===c?(CAT_FG[c]||"#6366f1"):"#1e293b"}`,background:"transparent",color:catF===c?(CAT_FG[c]||"#818cf8"):"#475569",borderRadius:4,fontSize:9,fontWeight:700}}>{c==="all"?`All (${groups.length} projects, ${filtered.length} roles)`:c}</button>
        ))}
        <button onClick={toggleAll} style={{padding:"3px 9px",border:"1px solid #1e293b",background:"transparent",color:"#475569",borderRadius:4,fontSize:9,cursor:"pointer",marginLeft:"auto"}}>
          {expanded.size===groups.length?"Collapse All":"Expand All"}
        </button>
        <span style={{fontSize:9,color:"#334155"}}>Total: <span style={{color:"#fbbf24",fontWeight:700}}>{filtered.reduce((s,o)=>s+o.tot,0)}h</span></span>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:700}}>
          <thead>
            <tr style={{background:"#050a14",borderBottom:"1px solid #0a1020"}}>
              <th style={{padding:"5px 10px",textAlign:"left",fontSize:8,color:"#334155",fontWeight:400,textTransform:"uppercase",width:28}}></th>
              {["Opportunity / Role","Cat","Stage","Total Hrs"].map(h=><th key={h} style={{padding:"5px 10px",textAlign:"left",fontSize:8,color:"#334155",fontWeight:400,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}
              {DATES.map(d=><th key={d} style={{padding:"2px 1px",textAlign:"center",fontSize:7,color:"#1e293b",width:32}}>{d}</th>)}
            </tr>
          </thead>
          <tbody>
            {groups.map((g,gi)=>{
              const isOpen=expanded.has(g.project);
              const roleCount=g.roles.length;
              return(
                <React.Fragment key={g.project}>
                  {/* Project header row */}
                  <tr
                    onClick={()=>{const s=new Set(expanded);isOpen?s.delete(g.project):s.add(g.project);setExpanded(s);}}
                    style={{background:gi%2===0?"#080e1c":"#060b16",borderBottom:"1px solid #0a1020",cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#0d1628"}
                    onMouseLeave={e=>e.currentTarget.style.background=gi%2===0?"#080e1c":"#060b16"}>
                    <td style={{padding:"6px 10px",textAlign:"center"}}>
                      <span style={{fontSize:9,color:"#475569"}}>{isOpen?"▼":"▶"}</span>
                    </td>
                    <td style={{padding:"6px 10px",maxWidth:280}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#f1f5f9"}}>{g.project}</div>
                      <div style={{fontSize:8,color:"#334155",marginTop:1}}>{roleCount} role{roleCount!==1?"s":""} · {g.status}</div>
                    </td>
                    <td style={{padding:"6px 8px",whiteSpace:"nowrap"}}>
                      <span style={{fontSize:8,color:CAT_FG[g.cat],background:CAT_BG[g.cat],padding:"0 5px",borderRadius:4,fontWeight:700}}>{g.cat}</span>
                    </td>
                    <td style={{padding:"6px 8px",fontSize:8,color:"#475569",whiteSpace:"nowrap"}}>{g.status}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",fontSize:11,fontWeight:800,color:"#fbbf24"}}>{g.totalHrs}h</td>
                    {g.hours.map((h,j)=><WC key={j} v={h} t="d"/>)}
                  </tr>
                  {/* Role rows — only shown when expanded */}
                  {isOpen&&[...g.roles].sort((a,b)=>{
                    const order={"Commit":0,"Strong Upside":1,"Best Case":2};
                    const cd=(order[a.cat]??3)-(order[b.cat]??3);
                    return cd!==0?cd:b.tot-a.tot;
                  }).map((o,ri)=>{
                    const aw=o.hours.filter(h=>h>0).length;
                    return(
                      <tr key={o.id} style={{background:"#040810",borderBottom:"1px solid #060d18"}}>
                        <td style={{padding:"3px 10px"}}></td>
                        <td style={{padding:"3px 10px 3px 24px",maxWidth:280}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:9,fontWeight:700,color:"#94a3b8"}}>{o.role}</span>
                            {o.skill&&<span style={{fontSize:8,color:"#6366f1",background:"#1e1b4b",padding:"0 5px",borderRadius:3}}>{o.skill}</span>}
                            <span style={{fontSize:8,color:"#334155"}}>~{aw?Math.round(o.tot/aw):0}h/wk avg</span>
                          </div>
                        </td>
                        <td></td>
                        <td></td>
                        <td style={{padding:"3px 8px",textAlign:"center",fontSize:10,fontWeight:700,color:"#fb923c"}}>{o.tot}h</td>
                        {o.hours.map((h,j)=><WC key={j} v={h} t="d"/>)}
                      </tr>
                    );
                  })}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── OPP COVERAGE TAB — Single consolidated booking forecast ──
function CoverageTab({opps,allPeople,assignments}){
  const CAT_O={"Commit":0,"Strong Upside":1,"Best Case":2};
  const CAT_LIST=["Commit","Strong Upside","Best Case"];
  const CAT_COLORS={"Commit":"#10b981","Strong Upside":"#f59e0b","Best Case":"#818cf8"};
  const CAT_BG2={"Commit":"#052e16","Strong Upside":"#451a03","Best Case":"#1e1b4b"};

  // Group opps by project, sorted Commit→Strong Upside→Best Case
  const projects=useMemo(()=>{
    const map={};
    opps.forEach(o=>{
      if(!map[o.project]) map[o.project]={project:o.project,cat:o.cat,roles:[],covered:0,total:0};
      const pg=map[o.project];
      // Upgrade project cat to highest priority seen
      if((CAT_O[o.cat]??3)<(CAT_O[pg.cat]??3)) pg.cat=o.cat;
      const aname=assignments[o.id]==="__cleared"?null:(assignments[o.id]||null);
      pg.roles.push({...o,assigned:aname,status:aname?"covered":"gap"});
      pg.total++;
      if(aname) pg.covered++;
    });
    return Object.values(map).sort((a,b)=>(CAT_O[a.cat]??3)-(CAT_O[b.cat]??3)||b.total-a.total);
  },[opps,assignments]);

  const grandTotal=projects.reduce((s,p)=>s+p.total,0);
  const grandCovered=projects.reduce((s,p)=>s+p.covered,0);
  const pctCovered=grandTotal>0?Math.round((grandCovered/grandTotal)*100):0;
  const [expanded,setExpanded]=useState(new Set());
  const toggleAll=()=>setExpanded(expanded.size===projects.length?new Set():new Set(projects.map(p=>p.project)));

  return(
    <div style={{paddingBottom:30}}>
      {/* Summary header */}
      <div style={{padding:"12px 16px",borderBottom:"1px solid #0a1020",background:"#050a14",display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:"#f1f5f9"}}>📋 Opp Coverage by Opportunity</div>
          <div style={{fontSize:9,color:"#475569",marginTop:2}}>{projects.length} opportunities · {grandTotal} role-slots</div>
        </div>
        <div style={{textAlign:"center",padding:"4px 14px",background:"#052e16",borderRadius:8,border:"1px solid #10b98122"}}>
          <div style={{fontSize:20,fontWeight:800,color:"#34d399"}}>{pctCovered}%</div>
          <div style={{fontSize:8,color:"#34d399",opacity:0.7,textTransform:"uppercase",letterSpacing:"0.08em"}}>Covered</div>
        </div>
        {[{label:"✓ Staffed",val:grandCovered,color:"#34d399",bg:"#052e16"},{label:"✗ Gap / Hire",val:grandTotal-grandCovered,color:"#ef4444",bg:"#3b0000"}].map(s=>(
          <div key={s.label} style={{textAlign:"center",padding:"4px 12px",background:s.bg,borderRadius:8,border:`1px solid ${s.color}22`}}>
            <div style={{fontSize:16,fontWeight:800,color:s.color}}>{s.val}</div>
            <div style={{fontSize:8,color:s.color,opacity:0.7,textTransform:"uppercase",letterSpacing:"0.08em"}}>{s.label}</div>
          </div>
        ))}
        {CAT_LIST.map(c=>{
          const catProjs=projects.filter(p=>p.cat===c);
          const catCov=catProjs.reduce((s,p)=>s+p.covered,0);
          const catTot=catProjs.reduce((s,p)=>s+p.total,0);
          const pct=catTot>0?Math.round((catCov/catTot)*100):0;
          return(
            <div key={c} style={{textAlign:"center",padding:"4px 12px",background:CAT_BG2[c],borderRadius:8,border:`1px solid ${CAT_COLORS[c]}22`}}>
              <div style={{fontSize:14,fontWeight:800,color:CAT_COLORS[c]}}>{pct}%</div>
              <div style={{fontSize:8,color:CAT_COLORS[c],opacity:0.7}}>{c}</div>
              <div style={{fontSize:8,color:"#475569"}}>{catProjs.length} opps</div>
            </div>
          );
        })}
        <button onClick={toggleAll} style={{marginLeft:"auto",padding:"5px 12px",border:"1px solid #1e293b",background:"transparent",color:"#475569",borderRadius:5,fontSize:9,cursor:"pointer"}}>
          {expanded.size===projects.length?"Collapse All":"Expand All"}
        </button>
      </div>

      {/* Project rows */}
      {projects.map(pg=>{
        const pct=pg.total>0?Math.round((pg.covered/pg.total)*100):0;
        const barColor=pct===100?"#10b981":pct>=50?"#f59e0b":"#ef4444";
        const isOpen=expanded.has(pg.project);
        const catColor=CAT_COLORS[pg.cat]||"#94a3b8";
        const catBg=CAT_BG2[pg.cat]||"#0f172a";
        // Sort roles within opp: covered first, then gap
        const sortedRoles=[...pg.roles].sort((a,b)=>{const cd=(CAT_O[a.cat]??3)-(CAT_O[b.cat]??3);if(cd!==0)return cd;return a.status==="covered"&&b.status!=="covered"?-1:a.status!=="covered"&&b.status==="covered"?1:0;});
        return(
          <div key={pg.project} style={{borderBottom:"1px solid #060d18"}}>
            <div onClick={()=>setExpanded(prev=>{const s=new Set(prev);s.has(pg.project)?s.delete(pg.project):s.add(pg.project);return s;})}
              style={{padding:"8px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,
                      background:isOpen?"#07101a":"transparent"}}
              onMouseEnter={e=>e.currentTarget.style.background="#07101a"}
              onMouseLeave={e=>e.currentTarget.style.background=isOpen?"#07101a":"transparent"}>
              <span style={{fontSize:10,color:"#475569",width:12}}>{isOpen?"▼":"▶"}</span>
              {/* Opp name */}
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontSize:11,fontWeight:700,color:"#e2e8f0"}}>{pg.project}</span>
              </div>
              {/* Category badge */}
              <span style={{fontSize:8,fontWeight:700,color:catColor,background:catBg,padding:"1px 8px",borderRadius:6,whiteSpace:"nowrap"}}>{pg.cat}</span>
              {/* Coverage bar + % */}
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:80,height:6,background:"#0f172a",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,fontWeight:800,color:barColor,width:34,textAlign:"right"}}>{pct}%</span>
              </div>
              {/* Slot counts */}
              <div style={{display:"flex",gap:8,fontSize:9,minWidth:100,justifyContent:"flex-end"}}>
                <span style={{color:"#34d399"}}>{pg.covered} staffed</span>
                {pg.total-pg.covered>0&&<span style={{color:"#ef4444"}}>{pg.total-pg.covered} gap</span>}
                <span style={{color:"#475569"}}>{pg.total} total</span>
              </div>
            </div>

            {/* Expanded: role slots */}
            {isOpen&&(
              <div style={{background:"#04080f",borderTop:"1px solid #0a1020",padding:"4px 0 8px 36px"}}>
                {sortedRoles.map((r,i)=>{
                  const roleColor=r.status==="covered"?"#34d399":"#ef4444";
                  const roleIcon=r.status==="covered"?"✓":"✗";
                  return(
                    <div key={i} style={{padding:"4px 16px 4px 0",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid #07101a"}}>
                      <span style={{fontSize:10,color:roleColor,width:12,flexShrink:0}}>{roleIcon}</span>
                      <span style={{fontSize:10,fontWeight:700,color:"#cbd5e1"}}>{r.role}</span>
                      {r.skill&&<span style={{fontSize:8,color:"#818cf8",background:"#1e1b4b",padding:"1px 6px",borderRadius:4}}>{r.skill}</span>}
                      <span style={{fontSize:9,color:r.status==="covered"?"#34d399":"#ef4444",fontWeight:700,marginLeft:"auto"}}>
                        {r.assigned||"Hire Needed"}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


// ── SCENARIOS ──
const SC_KEY="nf-scenarios-v1";
function loadScenarios(){try{return JSON.parse(localStorage.getItem(SC_KEY)||"{}");}catch{return{};}}
function saveScenarios(s){localStorage.setItem(SC_KEY,JSON.stringify(s));}

// ── SKILL NORMALIZER MODAL ──
function SkillNormModal({allPeople,allOpps,onApply,onClose}){
  const skills=Array.from(new Set([...allPeople.map(p=>p.skill||""),...allOpps.map(o=>o.skill||"")])).sort();
  const[rules,setRules]=useState({}); // from→to
  const setRule=(from,to)=>setRules(p=>({...p,[from]:to}));
  const activeRules=Object.entries(rules).filter(([k,v])=>v&&v!==k);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d1424",border:"1px solid #1e293b",borderRadius:12,width:"100%",maxWidth:580,maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"14px 18px 10px",borderBottom:"1px solid #0f172a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:"#f1f5f9"}}>🔧 Skill Normalizer</div>
            <div style={{fontSize:9,color:"#475569",marginTop:2}}>Remap skill labels across all people and opportunities</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"#475569",fontSize:16,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"8px 18px"}}>
          <div style={{fontSize:9,color:"#334155",padding:"6px 0 4px",textTransform:"uppercase",letterSpacing:"0.1em"}}>Current Skills → Remap To</div>
          {skills.map(sk=>(
            <div key={sk} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid #060d18"}}>
              <span style={{fontSize:10,color:"#94a3b8",minWidth:160,fontWeight:600}}>{sk||"(blank)"}</span>
              <span style={{fontSize:10,color:"#334155"}}>→</span>
              <input value={rules[sk]??sk} onChange={e=>setRule(sk,e.target.value)}
                style={{flex:1,padding:"3px 8px",background:"#111827",border:"1px solid #1e293b",borderRadius:4,color:"#e2e8f0",fontFamily:"inherit",fontSize:10,outline:"none"}}/>
              {rules[sk]&&rules[sk]!==sk&&<span style={{fontSize:8,color:"#34d399"}}>✓ remapped</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"10px 18px",borderTop:"1px solid #0f172a",display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
          <span style={{fontSize:9,color:"#475569",marginRight:"auto"}}>{activeRules.length} remap{activeRules.length!==1?"s":""} pending</span>
          <button onClick={onClose} style={{padding:"5px 14px",border:"1px solid #1e293b",background:"transparent",color:"#475569",borderRadius:5,fontSize:9,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(activeRules.length>0)onApply(Object.fromEntries(activeRules));onClose();}}
            style={{padding:"5px 14px",border:"1px solid #6366f1",background:"#1e1b4b",color:"#818cf8",borderRadius:5,fontSize:9,fontWeight:700,cursor:"pointer"}}>
            Apply {activeRules.length} Remap{activeRules.length!==1?"s":""}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SCENARIO MANAGER MODAL ──
function ScenarioModal({assignments,onLoad,onClose}){
  const[scenarios,setScenarios]=useState(loadScenarios());
  const[newName,setNewName]=useState("");
  const saveNew=()=>{
    if(!newName.trim()) return;
    const updated={...scenarios,[newName.trim()]:{assignments,savedAt:new Date().toLocaleString()}};
    saveScenarios(updated);
    setScenarios(updated);
    setNewName("");
  };
  const del=(name)=>{
    const updated={...scenarios};delete updated[name];
    saveScenarios(updated);setScenarios(updated);
  };
  const names=Object.keys(scenarios).sort();
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d1424",border:"1px solid #1e293b",borderRadius:12,width:"100%",maxWidth:500,maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"14px 18px 10px",borderBottom:"1px solid #0f172a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:"#f1f5f9"}}>💾 Saved Scenarios</div>
            <div style={{fontSize:9,color:"#475569",marginTop:2}}>Save and switch between assignment plans</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"#475569",fontSize:16,cursor:"pointer"}}>✕</button>
        </div>
        {/* Save current */}
        <div style={{padding:"10px 18px",borderBottom:"1px solid #0f172a",display:"flex",gap:8}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&saveNew()}
            placeholder='Name this scenario, e.g. "Conservative Plan"…'
            style={{flex:1,padding:"6px 10px",background:"#111827",border:"1px solid #1e293b",borderRadius:5,color:"#e2e8f0",fontFamily:"inherit",fontSize:10,outline:"none"}}/>
          <button onClick={saveNew} style={{padding:"6px 14px",border:"1px solid #10b981",background:"#052e16",color:"#34d399",borderRadius:5,fontSize:9,fontWeight:700,cursor:"pointer"}}>
            💾 Save
          </button>
        </div>
        {/* Scenario list */}
        <div style={{overflowY:"auto",flex:1,padding:"4px 0"}}>
          {names.length===0&&<div style={{padding:"24px",textAlign:"center",color:"#334155",fontSize:10}}>No saved scenarios yet.</div>}
          {names.map(name=>(
            <div key={name} style={{padding:"8px 18px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #060d18"}}
              onMouseEnter={e=>e.currentTarget.style.background="#07101a"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0"}}>{name}</div>
                <div style={{fontSize:8,color:"#334155",marginTop:1}}>Saved {scenarios[name].savedAt} · {Object.keys(scenarios[name].assignments).length} assignments</div>
              </div>
              <button onClick={()=>{onLoad(scenarios[name].assignments);onClose();}}
                style={{padding:"4px 12px",border:"1px solid #6366f1",background:"#1e1b4b",color:"#818cf8",borderRadius:5,fontSize:8,fontWeight:700,cursor:"pointer"}}>
                Load
              </button>
              <button onClick={()=>del(name)}
                style={{padding:"4px 8px",border:"1px solid #3b0000",background:"transparent",color:"#ef4444",borderRadius:5,fontSize:9,cursor:"pointer"}}>
                ✕
              </button>
            </div>
          ))}
        </div>
        <div style={{padding:"8px 18px",borderTop:"1px solid #0f172a",textAlign:"right"}}>
          <button onClick={onClose} style={{padding:"5px 14px",border:"1px solid #1e293b",background:"transparent",color:"#475569",borderRadius:5,fontSize:9,cursor:"pointer"}}>Close</button>
        </div>
      </div>
    </div>
  );
}


function App(){
  const[data,setData]=useState(null);
  const[assignments,setAssignments]=useState({});
  const[tab,setTab]=useState("__hires");
  const[showUpload,setShowUpload]=useState(false);
  const[saved,setSaved]=useState(false);
  const[ready,setReady]=useState(false);
  const[showScenarios,setShowScenarios]=useState(false);
  const[showSkillNorm,setShowSkillNorm]=useState(false);

  useEffect(()=>{
    const built=buildAppData([...EMBEDDED_PEOPLE],[...EMBEDDED_OPPS]);
    try{
      const d=localStorage.getItem(SK+"-data");
      const a=localStorage.getItem(SK+"-asgn");
      if(d){
        // Saved session: restore data + assignments
        setData(JSON.parse(d));
        if(a) setAssignments(JSON.parse(a));
        else setAssignments(autoAssign(JSON.parse(d).allPeople,JSON.parse(d).allOpps));
      }else{
        // Fresh start: use embedded data, run auto-assign
        setData(built);
        setAssignments(autoAssign(built.allPeople,built.allOpps));
      }
    }catch(e){
      setData(built);
      setAssignments(autoAssign(built.allPeople,built.allOpps));
    }
    setReady(true);
  },[]);

  useEffect(()=>{if(!ready||!data)return;try{localStorage.setItem(SK+"-data",JSON.stringify(data));}catch(e){}},[data,ready]);
  useEffect(()=>{if(!ready)return;try{localStorage.setItem(SK+"-asgn",JSON.stringify(assignments));setSaved(true);setTimeout(()=>setSaved(false),1400);}catch(e){}},[assignments,ready]);

  const handleLoad=useCallback(({people,opps,mode})=>{
    const built=buildAppData(people,opps);
    setData(built);
    const auto=autoAssign(people,opps);
    if(mode==="newmonth"){setAssignments(auto);}
    else{setAssignments(prev=>({...auto,...prev}));}
    setShowUpload(false);setTab("__hires");
  },[]);

  const allPeople=data?.allPeople||[];
  const allOpps=data?.allOpps||[];
  const tabs=data?.tabs||[];
  const assignedNames=useMemo(()=>new Set(Object.values(assignments).filter(v=>v&&v!=="__cleared")),[assignments]);

  const totalGaps=useMemo(()=>allOpps.filter(o=>{
    if(assignments[o.id]) return false;
    const best=allPeople.filter(p=>!assignedNames.has(p.name)).map(p=>scoreMatch(p,o,assignedNames)).sort((a,b)=>b.score-a.score)[0];
    return !best||best.score<50;
  }).length,[allOpps,allPeople,assignments,assignedNames]);

  const totalCovered=allOpps.length-totalGaps;
  const curPracticeTab=tabs.find(t=>t.id===tab);

  const tabGaps=useMemo(()=>{
    const g={};
    tabs.forEach(t=>{
      g[t.id]=t.opps.filter(o=>{
        if(assignments[o.id]) return false;
        const best=allPeople.filter(p=>!assignedNames.has(p.name)).map(p=>scoreMatch(p,o,assignedNames)).sort((a,b)=>b.score-a.score)[0];
        return !best||best.score<50;
      }).length;
    });
    return g;
  },[tabs,assignments,assignedNames,allPeople]);

  return(
    <div style={{minHeight:"100vh",background:"#070c17",color:"#e2e8f0",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>

      {/* HEADER */}
      <div style={{padding:"7px 14px",borderBottom:"1px solid #0a1020",background:"#060b15",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontSize:7,color:"#334155",letterSpacing:"0.18em",textTransform:"uppercase"}}>NeuraFlash · Capacity Planning</div>
          <div style={{fontSize:13,fontWeight:800,color:"#f1f5f9",letterSpacing:"-0.02em"}}>Staffing Assignment Tool</div>
        </div>
        <div style={{fontSize:8,color:"#1e3a5f",background:"#050d1a",padding:"2px 8px",borderRadius:8}}>📅 Mar–May 2026</div>
        <div style={{fontSize:8,color:"#10b981",background:"#052e16",padding:"2px 8px",borderRadius:8,fontWeight:700}}>v8</div>
        <div style={{flex:1}}/>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {data&&[
            {v:Object.keys(assignments).length,l:"Assigned",c:"#818cf8"},
            {v:totalCovered,l:"Covered",c:"#34d399"},
            {v:totalGaps,l:"Gaps",c:totalGaps>0?"#ef4444":"#34d399"},
          ].map(x=>(
            <div key={x.l} style={{textAlign:"center",padding:"0 5px",borderRight:"1px solid #0a1020"}}>
              <div style={{fontSize:17,fontWeight:800,color:x.c,lineHeight:1}}>{x.v}</div>
              <div style={{fontSize:7,color:"#334155",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:1}}>{x.l}</div>
            </div>
          ))}
          <span style={{fontSize:8,color:saved?"#34d399":"#1a2535",transition:"color 0.5s",minWidth:48,paddingLeft:4}}>{saved?"✓ saved":""}</span>
          {data&&<button onClick={()=>exportExcel(allOpps,allPeople,assignments)}
            style={{padding:"4px 10px",background:"#052e16",border:"1px solid #10b981",color:"#34d399",borderRadius:5,fontSize:9,fontWeight:700}}>⬇ Export</button>}
          <button onClick={()=>setShowScenarios(true)}
            style={{padding:"4px 10px",background:"#0d1a2e",border:"1px solid #3b82f6",color:"#60a5fa",borderRadius:5,fontSize:9,fontWeight:700}}>💾 Scenarios</button>
          {data&&<button onClick={()=>setShowSkillNorm(true)}
            style={{padding:"4px 10px",background:"#1a0d2e",border:"1px solid #7c3aed",color:"#a78bfa",borderRadius:5,fontSize:9,fontWeight:700}}>🔧 Skills</button>}
          <button onClick={()=>setShowUpload(true)}
            style={{padding:"4px 10px",background:"#1e1b4b",border:"1px solid #6366f1",color:"#818cf8",borderRadius:5,fontSize:9,fontWeight:700}}>⬆ Load Data</button>
          {data&&<button onClick={()=>{if(window.confirm("Reset all assignments to auto-assign?"))setAssignments(autoAssign(allPeople,allOpps));}}
            style={{padding:"4px 9px",background:"transparent",border:"1px solid #1e293b",color:"#475569",borderRadius:5,fontSize:9}}>Reset</button>}
        </div>
      </div>

      {/* TAB BAR */}
      <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid #0a1020",background:"#050a14",padding:"0 4px",position:"sticky",top:44,zIndex:99}}>
        {GLOBAL_TABS.map(t=>{
          const act=tab===t.id;
          return(<button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"6px 11px",border:"none",borderBottom:`2px solid ${act?t.color:"transparent"}`,background:act?"#0d1424":"transparent",color:act?"#f1f5f9":"#475569",cursor:"pointer",fontSize:9,fontWeight:act?700:400,whiteSpace:"nowrap",outline:"none"}}>
            {t.label}
          </button>);
        })}
        <div style={{width:1,background:"#0f172a",margin:"4px 3px 0",flexShrink:0}}/>
        {tabs.map(t=>{
          const g=tabGaps[t.id]||0,act=tab===t.id;
          return(<button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"6px 9px",border:"none",borderBottom:`2px solid ${act?t.color:"transparent"}`,background:act?"#0d1424":"transparent",color:act?"#f1f5f9":"#475569",cursor:"pointer",fontSize:9,fontWeight:act?700:400,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:3,outline:"none"}}>
            <span style={{width:4,height:4,borderRadius:"50%",background:t.color,opacity:act?1:0.35,display:"inline-block",flexShrink:0}}/>
            {t.label}
            {g>0&&<span style={{fontSize:7,background:"#3b0000",color:"#ef4444",padding:"0 3px",borderRadius:6,fontWeight:800,lineHeight:"14px"}}>{g}</span>}
          </button>);
        })}
      </div>

      {/* CONTENT */}
      {data&&<React.Fragment>
        {tab==="__hires"&&<HiresTab opps={allOpps} allPeople={allPeople} assignments={assignments}/>}
        {tab==="__coverage"&&<CoverageTab opps={allOpps} allPeople={allPeople} assignments={assignments}/>}
        {tab==="__demand"&&<DemandTab opps={allOpps}/>}
        {tab==="__people"&&<PeopleTab people={allPeople} assignments={assignments}/>}
        {curPracticeTab&&<PracticeTab tab={curPracticeTab} allPeople={allPeople} allOpps={allOpps} assignments={assignments} setAssignments={setAssignments}/>}
      </React.Fragment>}

      {showUpload&&<UploadModal onLoad={handleLoad} onClose={()=>setShowUpload(false)} hasData={!!data}/>}

      {showScenarios&&<ScenarioModal assignments={assignments}
        onLoad={(a)=>{setAssignments(a);setShowScenarios(false);}}
        onClose={()=>setShowScenarios(false)}/>}

      {showSkillNorm&&data&&<SkillNormModal allPeople={allPeople} allOpps={allOpps}
        onApply={(rules)=>{
          setData(prev=>{
            const d=JSON.parse(JSON.stringify(prev));
            d.allPeople.forEach(p=>{if(rules[p.skill||""]!==undefined)p.skill=rules[p.skill||""];});
            d.allOpps.forEach(o=>{if(rules[o.skill||""]!==undefined)o.skill=rules[o.skill||""];});
            d.tabs.forEach(t=>{
              t.people.forEach(p=>{if(rules[p.skill||""]!==undefined)p.skill=rules[p.skill||""];});
              t.opps.forEach(o=>{if(rules[o.skill||""]!==undefined)o.skill=rules[o.skill||""];});
            });
            return d;
          });
        }}
        onClose={()=>setShowSkillNorm(false)}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));

</script>
</body>
</html>
